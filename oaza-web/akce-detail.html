<script>
/* ---------- menu (shodné s ostatními stránkami) ---------- */
function prepniMenu(btn){
  const m=document.getElementById('menu');
  const open=m.classList.toggle('open');
  btn.textContent=open?'✕':'☰';
}
document.querySelectorAll('#menu a').forEach(a=>a.addEventListener('click',()=>{
  const m=document.getElementById('menu');
  if(m.classList.contains('open')){
    m.classList.remove('open');
    document.querySelector('.nav-toggle').textContent='☰';
  }
}));

/* ---------- pomocné ---------- */
function esc(s){
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(x){ return Number(x).toLocaleString('cs-CZ'); }
function cenaText(a){
  if(a.platba_typ==='zdarma') return 'Vstup zdarma';
  const c=[];
  if(a.cena_czk!=null) c.push(fmt(a.cena_czk)+' Kč');
  if(a.cena_eur!=null) c.push(fmt(a.cena_eur)+' €');
  let t=c.join(' / ');
  if(a.platba_typ==='na_miste' && t) t+=' (na místě)';
  return t;
}
function datumText(a){
  if(a.datum_text) return a.datum_text;
  if(a.datum_od){
    try{
      return new Date(a.datum_od).toLocaleDateString('cs-CZ',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    }catch(e){}
  }
  return '';
}

/* Jednoduchý, bezpečný převod Markdownu (popis akce z adminu) na HTML.
   Nejdřív vše escapuje, pak aplikuje: ###/##/# nadpisy, **tučně**, *kurzíva*,
   [odkaz](https://…), odrážky - a •, odstavce. */
function mdNaHtml(md){
  const radky = esc(md).split(/\r?\n/);
  const inline = s => s
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g,'<em>$1</em>')
    .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  let html='', vSeznamu=false, odst=[];
  const zavriSeznam=()=>{ if(vSeznamu){ html+='</ul>'; vSeznamu=false; } };
  const vypustOdst=()=>{ if(odst.length){ html+='<p>'+inline(odst.join('<br>'))+'</p>'; odst=[]; } };
  for(const raw of radky){
    const l=raw.trim();
    if(!l){ zavriSeznam(); vypustOdst(); continue; }
    const h=l.match(/^(#{1,3})\s+(.*)$/);
    if(h){ zavriSeznam(); vypustOdst(); const lvl=h[1].length+2; html+='<h'+lvl+'>'+inline(h[2])+'</h'+lvl+'>'; continue; }
    if(/^[-•*]\s+/.test(l)){ vypustOdst(); if(!vSeznamu){ html+='<ul>'; vSeznamu=true; } html+='<li>'+inline(l.replace(/^[-•*]\s+/,''))+'</li>'; continue; }
    zavriSeznam();
    odst.push(l);
  }
  zavriSeznam(); vypustOdst();
  return html;
}

const STAVY={ otevrena:{cls:'',txt:''}, obsazena:{cls:'full',txt:'Obsazeno'}, zrusena:{cls:'cancel',txt:'Zrušeno'} };

/* ---------- načtení a vykreslení akce ---------- */
let AKCE=null;

function zjistiSlug(){
  const q=new URLSearchParams(location.search).get('slug');
  if(q) return decodeURIComponent(q);
  const m=location.pathname.match(/^\/akce\/([^\/]+)/);
  return m?decodeURIComponent(m[1]):null;
}

async function nacti(){
  const obsah=document.getElementById('obsah');
  const slug=zjistiSlug();
  if(!slug){ ukazNenalezeno(); return; }
  try{
    const r=await fetch('/api/akce-list');
    if(!r.ok) throw new Error('API '+r.status);
    const {akce}=await r.json();
    const a=(akce||[]).find(x=>x.slug===slug);
    if(!a){ ukazNenalezeno(); return; }
    AKCE=a;
    vykresli(a);
  }catch(e){
    obsah.innerHTML='<div class="notfound">Akci se nepodařilo načíst. Zkuste to prosím za chvíli.<br><a class="more" href="/akce">Zpět na akce</a></div>';
  }
}

function ukazNenalezeno(){
  document.getElementById('obsah').innerHTML=
    '<div class="notfound">Tuto akci jsme nenašli — možná už proběhla, nebo byl odkaz změněn.<br><a class="more" href="/akce">Zobrazit všechny akce</a></div>';
}

function vykresli(a){
  document.title=(a.nazev||'Akce')+' | Oáza Adamanthea';
  const popisKratky=String(a.popis||'').replace(/[#*\[\]]/g,'').replace(/\s+/g,' ').trim().slice(0,155);
  let metaDesc=document.querySelector('meta[name="description"]');
  if(metaDesc && popisKratky) metaDesc.setAttribute('content',popisKratky);
  let can=document.querySelector('link[rel="canonical"]');
  if(!can){ can=document.createElement('link'); can.setAttribute('rel','canonical'); document.head.appendChild(can); }
  can.setAttribute('href','https://oaza-adamanthea.cz/akce/'+encodeURIComponent(a.slug));

  const st=STAVY[a.stav]||STAVY.otevrena;
  const badge=st.txt?'<span class="badge '+st.cls+'">'+st.txt+'</span>':'';
  const img=a.obrazek_url
    ? '<img src="'+esc(a.obrazek_url)+'" alt="'+esc((a.nazev||'').replace(/"/g,''))+'">'
    : '<div class="ph">Oáza Adamanthea</div>';
  const cena=cenaText(a);
  const datum=datumText(a);

  /* CTA / stav v hlavičce */
  let akcni='';
  if(a.stav==='zrusena'){
    akcni='<div class="stavbox">Tato akce byla zrušena.</div>';
  }else if(a.stav==='obsazena'){
    akcni='<div class="stavbox">Akce je aktuálně obsazená. Sledujte nás — místa se někdy uvolní.</div>';
  }else if(a.prihlaska_url){
    akcni='<a class="cta" href="'+esc(a.prihlaska_url)+'" target="_blank" rel="noopener">Přihlásit se</a>';
  }else{
    akcni='<a class="cta" href="#prihlaseni" onclick="document.getElementById(\'prihlaseni\').scrollIntoView({behavior:\'smooth\'});return false;">Přihlásit se</a>';
  }

  let html=
    '<article class="detail">'+
      '<div class="poster">'+img+badge+'</div>'+
      '<div class="info">'+
        '<div class="eyebrow">Oáza Adamanthea</div>'+
        '<h1>'+esc(a.nazev||'')+'</h1>'+
        '<div class="meta">'+
          (datum?'<span>📅 '+esc(datum)+'</span>':'')+
          (a.misto?'<span>📍 '+esc(a.misto)+'</span>':'')+
        '</div>'+
        (cena?'<div class="price">'+cena+'</div>':'')+
        akcni+
      '</div>'+
    '</article>'+
    (a.popis?'<section class="popis">'+mdNaHtml(a.popis)+'</section>':'');

  /* interní formulář jen když akce běží a nemá externí přihlášku */
  if(a.stav!=='zrusena' && a.stav!=='obsazena' && !a.prihlaska_url){
    html+=sestavFormular(a);
  }

  document.getElementById('obsah').innerHTML=html;
  vlozJsonLd(a);
}

function sestavFormular(a){
  const menaVolba=(a.platba_typ==='online' && a.cena_czk!=null && a.cena_eur!=null)
    ? '<div class="field"><label>Měna platby</label><div class="radioradek">'+
        '<label><input type="radio" name="f_mena" value="czk" checked> Kč (CZK)</label>'+
        '<label><input type="radio" name="f_mena" value="eur"> € (EUR)</label>'+
      '</div></div>'
    : '';
  return '<section class="prihlaseni" id="prihlaseni">'+
    '<h2>Přihláška na akci</h2>'+
    '<p class="sub">Po odeslání vám přijde potvrzení e-mailem'+(a.platba_typ==='online'?' včetně platebních údajů a QR kódu':'')+'.</p>'+
    '<div class="chyba" id="f_chyba"></div>'+
    '<div class="grid2">'+
      '<div class="field"><label>Jméno a příjmení *</label><input id="f_jmeno" autocomplete="name"></div>'+
      '<div class="field"><label>E-mail *</label><input id="f_email" type="email" autocomplete="email"></div>'+
    '</div>'+
    '<div class="grid2">'+
      '<div class="field"><label>Telefon</label><input id="f_telefon" type="tel" autocomplete="tel" placeholder="+420 …"></div>'+
      '<div class="field"><label>Počet osob</label><input id="f_osob" type="number" min="1" max="10" step="1" value="1"></div>'+
    '</div>'+
    menaVolba+
    '<div class="field"><label>Poznámka</label><textarea id="f_poznamka" placeholder="Chcete nám něco vzkázat? (nepovinné)"></textarea></div>'+
    '<label class="souhlas"><input type="checkbox" id="f_souhlas"> <span>Souhlasím se zpracováním osobních údajů pro účely přihlášky na akci (<a href="/gdpr" target="_blank">zásady ochrany údajů</a>).</span></label>'+
    '<button class="cta" id="f_odeslat" onclick="odeslat()">Odeslat přihlášku</button>'+
  '</section>';
}

/* ---------- odeslání přihlášky ---------- */
async function odeslat(){
  const a=AKCE; if(!a) return;
  const chyba=document.getElementById('f_chyba');
  const btn=document.getElementById('f_odeslat');
  chyba.style.display='none';

  const jmeno=document.getElementById('f_jmeno').value.trim();
  const email=document.getElementById('f_email').value.trim();
  const telefon=document.getElementById('f_telefon').value.trim();
  const pocet=parseInt(document.getElementById('f_osob').value,10)||1;
  const poznamka=document.getElementById('f_poznamka').value.trim();
  const souhlas=document.getElementById('f_souhlas').checked;
  const menaEl=document.querySelector('input[name="f_mena"]:checked');
  const mena=menaEl?menaEl.value:undefined;

  if(jmeno.length<2){ return ukazChybu('Vyplňte prosím jméno.'); }
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ return ukazChybu('Zadejte prosím platný e-mail.'); }
  if(!souhlas){ return ukazChybu('Je potřeba souhlas se zpracováním údajů.'); }

  btn.disabled=true; btn.textContent='Odesílám…';
  try{
    const r=await fetch('/api/akce-prihlasit',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        slug:a.slug, jmeno, email,
        telefon:telefon||undefined,
        pocet_osob:pocet,
        mena,
        poznamka:poznamka||undefined,
        souhlas:true
      })
    });
    const data=await r.json().catch(()=>({}));
    if(!r.ok || !data.ok){
      ukazChybu(data.error||'Přihlášku se nepodařilo odeslat. Zkuste to prosím znovu.');
      btn.disabled=false; btn.textContent='Odeslat přihlášku';
      return;
    }
    ukazUspech(data, email);
  }catch(e){
    ukazChybu('Přihlášku se nepodařilo odeslat. Zkontrolujte připojení a zkuste to znovu.');
    btn.disabled=false; btn.textContent='Odeslat přihlášku';
  }
}

function ukazChybu(txt){
  const ch=document.getElementById('f_chyba');
  ch.textContent=txt; ch.style.display='block';
  ch.scrollIntoView({behavior:'smooth',block:'center'});
}

function ukazUspech(data, email){
  const symbol=data.mena==='eur'?'€':'Kč';
  const castkaStr=data.castka!=null?fmt(data.castka)+' '+symbol:'';
  let platba='';
  if(data.platba_typ==='online' && data.qrUrl){
    platba='<p>Částka: <strong>'+castkaStr+'</strong> · Variabilní symbol: <strong class="vs">'+esc(data.vs)+'</strong></p>'+
      '<img class="qr" src="'+esc(data.qrUrl)+'" alt="QR platba">'+
      '<p class="pozn">Naskenujte QR v bankovní aplikaci. Kompletní platební údaje najdete v e-mailu.<br>Místo vám rezervujeme po připsání platby.</p>';
  }else if(data.platba_typ==='online'){
    platba='<p class="pozn">Platební údaje vám zašleme e-mailem.</p>';
  }else if(data.platba_typ==='na_miste'){
    platba=castkaStr?'<p>Částka <strong>'+castkaStr+'</strong> se hradí na místě při příchodu.</p>':'<p>Platba probíhá na místě.</p>';
  }else{
    platba='<p>Účast je zdarma. Těšíme se na vás. 🌿</p>';
  }
  const el=document.getElementById('prihlaseni');
  el.innerHTML='<div class="uspech">'+
    '<h2>✨ Přihláška odeslána</h2>'+
    '<p>Potvrzení jsme poslali na <strong>'+esc(email)+'</strong>.</p>'+
    platba+
  '</div>';
  el.scrollIntoView({behavior:'smooth',block:'center'});
}

/* ---------- JSON-LD pro vyhledávače ---------- */
function vlozJsonLd(a){
  try{
    const ld={
      '@context':'https://schema.org',
      '@type':'Event',
      name:a.nazev||'',
      url:'https://oaza-adamanthea.cz/akce/'+encodeURIComponent(a.slug),
      eventStatus:a.stav==='zrusena'?'https://schema.org/EventCancelled':'https://schema.org/EventScheduled',
      organizer:{'@type':'Organization',name:'Oáza Adamanthea',url:'https://oaza-adamanthea.cz'}
    };
    if(a.datum_od) ld.startDate=a.datum_od;
    if(a.misto) ld.location={'@type':'Place',name:a.misto};
    if(a.obrazek_url) ld.image=[a.obrazek_url];
    if(a.cena_czk!=null) ld.offers={'@type':'Offer',price:String(a.cena_czk),priceCurrency:'CZK',availability:a.stav==='obsazena'?'https://schema.org/SoldOut':'https://schema.org/InStock'};
    const s=document.createElement('script');
    s.type='application/ld+json';
    s.textContent=JSON.stringify(ld);
    document.head.appendChild(s);
  }catch(e){}
}

nacti();
