<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Oáza Adamanthea · Administrace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Cormorant+Garamond:wght@500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f6f0e3; --bg2:#ece4d2; --panel:#fdfaf2; --panel2:#f2ebdb; --line:#d9cdb3;
    --gold:#c8a45c; --gold-soft:#8f6c22; --cream:#26382e; --muted:#75816f; --rose:#a96060;
    --ok:#3e7f52; --warn:#9c7418; --bad:#a94f4f;
    --r:10px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--cream);font-family:'Jost',system-ui,sans-serif;font-weight:400;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:var(--gold-soft);text-decoration:none}
  button{font-family:inherit;cursor:pointer}
  h1,h2,h3{font-weight:500;margin:0}
  ::selection{background:rgba(200,164,92,.3)}
  input,select,textarea{font-family:inherit;font-size:14px;color:var(--cream);background:#fffdf6;border:1px solid var(--line);border-radius:8px;padding:8px 10px;width:100%}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold)}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 4px;letter-spacing:.02em}
  textarea{resize:vertical;min-height:70px}

  /* Login */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .login-card{width:100%;max-width:360px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:34px 30px;text-align:center}
  .login-card .mark{font-family:'Cinzel';color:var(--gold-soft);letter-spacing:.14em;font-size:13px;text-transform:uppercase;margin-bottom:6px}
  .login-card h1{font-family:'Cormorant Garamond';font-size:30px;color:var(--cream);margin-bottom:22px}
  .login-card .err{color:var(--bad);font-size:13px;min-height:18px;margin-top:10px}

  /* Layout */
  #app{display:none;min-height:100vh}
  .shell{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
  .side{background:var(--bg2);border-right:1px solid var(--line);padding:20px 14px;position:sticky;top:0;height:100vh;overflow-y:auto}
  .brand{font-family:'Cinzel';color:var(--gold-soft);font-size:15px;letter-spacing:.1em;text-transform:uppercase;padding:4px 8px 16px;border-bottom:1px solid var(--line);margin-bottom:14px}
  .brand small{display:block;font-family:'Jost';font-weight:300;font-size:11px;letter-spacing:.14em;color:var(--muted);margin-top:3px;text-transform:none}
  .navgrp{margin:16px 0 6px;padding:0 8px;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  .nav a{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:8px;color:var(--cream);font-size:14px;margin-bottom:2px;cursor:pointer}
  .nav a:hover{background:var(--panel)}
  .nav a.active{background:var(--panel2);color:var(--gold-soft)}
  .nav a .badge{background:var(--gold);color:#20130a;font-size:11px;font-weight:600;border-radius:20px;padding:1px 7px;min-width:20px;text-align:center}
  .side .logout{margin-top:20px;width:100%;background:transparent;border:1px solid var(--line);color:var(--muted);padding:8px;border-radius:8px;font-size:13px}
  .side .logout:hover{border-color:var(--rose);color:var(--rose)}

  main{padding:26px 30px 60px;max-width:1200px}
  .topline{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
  .topline h1{font-family:'Cinzel';font-size:22px;color:var(--cream);font-weight:500}
  .topline .sub{color:var(--muted);font-size:13px}

  /* Buttons */
  .btn{background:var(--gold);color:#20130a;border:none;border-radius:8px;padding:8px 15px;font-size:14px;font-weight:500}
  .btn:hover{background:#d4b26b}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--cream)}
  .btn.ghost:hover{border-color:var(--gold)}
  .btn.sm{padding:5px 10px;font-size:13px}
  .btn.danger{background:transparent;border:1px solid var(--rose);color:var(--rose)}
  .btn.danger:hover{background:var(--rose);color:#fff}
  .btn:disabled{opacity:.5;cursor:default}

  /* Cards & KPI */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .kpi .lab{font-size:12px;color:var(--muted);letter-spacing:.03em}
  .kpi .val{font-family:'Cormorant Garamond';font-size:38px;line-height:1.05;color:var(--gold-soft);margin-top:4px}
  .kpi .val.small{font-size:24px;font-family:'Jost';font-weight:500}
  .kpi.click{cursor:pointer}
  .kpi.click:hover{border-color:var(--gold)}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:0;overflow:hidden;margin-bottom:20px}
  .panel .head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .panel .head h3{font-size:15px;color:var(--cream);font-weight:500}
  .panel .body{padding:16px 18px}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .toolbar input,.toolbar select{width:auto;min-width:120px}
  .grow{flex:1}

  /* Table */
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{text-align:left;font-weight:500;color:var(--muted);font-size:12px;letter-spacing:.03em;padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
  td{padding:9px 10px;border-bottom:1px solid rgba(139,122,88,.28);vertical-align:middle}
  tr:hover td{background:rgba(200,164,92,.14)}
  td.num,th.num{text-align:right}
  .tbl-wrap{overflow-x:auto}

  .pill{display:inline-block;font-size:11.5px;padding:2px 9px;border-radius:20px;border:1px solid var(--line);color:var(--muted);white-space:nowrap}
  .pill.ok{color:var(--ok);border-color:rgba(62,127,82,.35);background:rgba(62,127,82,.08)}
  .pill.warn{color:var(--warn);border-color:rgba(156,116,24,.35);background:rgba(156,116,24,.08)}
  .pill.bad{color:var(--bad);border-color:rgba(169,79,79,.35);background:rgba(169,79,79,.08)}
  .pill.gold{color:var(--gold-soft);border-color:rgba(143,108,34,.35);background:rgba(143,108,34,.1)}

  .rowacts{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;align-items:center}
  td.rowacts{display:table-cell;white-space:nowrap;text-align:right}
  td.rowacts .btn{margin:2px 0 2px 6px}
  tr.past td{opacity:.55}
  td.divider{padding:16px 10px 6px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  tr.grp td{background:var(--panel2);cursor:pointer;font-weight:500;padding:10px 12px;border-bottom:1px solid var(--line)}
  tr.grp:hover td{background:#ede3cc}
  tr.grp .caret{display:inline-block;width:16px;color:var(--gold-soft)}
  .muted{color:var(--muted)}
  .empty{padding:40px 20px;text-align:center;color:var(--muted)}
  .empty .big{font-family:'Cormorant Garamond';font-size:22px;color:var(--cream);margin-bottom:6px}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(48,38,18,.45);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow-y:auto}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;width:100%;max-width:640px;padding:24px}
  .modal h2{font-family:'Cinzel';font-size:18px;color:var(--cream);margin-bottom:16px;font-weight:500}
  .modal .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px 14px}
  .modal .field{margin-bottom:12px}
  .modal .foot{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--line)}
  .chk{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--cream)}
  .chk input{width:auto}
  .kv{display:grid;grid-template-columns:130px 1fr;gap:6px 14px;font-size:14px;margin-bottom:14px}
  .kv .k{color:var(--muted)}

  /* Toast */
  #toasts{position:fixed;right:20px;bottom:20px;display:flex;flex-direction:column;gap:10px;z-index:80}
  .toast{background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:8px;padding:11px 16px;font-size:14px;max-width:340px;box-shadow:0 8px 24px rgba(60,48,20,.15)}
  .toast.err{border-left-color:var(--bad)}
  .toast.ok{border-left-color:var(--ok)}

  /* Graf návštěv — celý sloupec je klikací (oprava pro mobil) */
  .chart{display:flex;align-items:flex-end;gap:3px;height:170px}
  .barcol{flex:1;min-width:0;height:100%;display:flex;align-items:flex-end;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
  .barcol .bar{width:100%;background:linear-gradient(180deg,var(--gold),rgba(200,164,92,.3));border-radius:3px 3px 0 0;min-height:2px;transition:filter .12s;pointer-events:none}
  .barcol:hover .bar{filter:brightness(1.08)}
  .barcol .bar.zero{background:var(--line)}
  .barcol.act .bar{filter:brightness(1.12);outline:1px solid var(--gold-soft);outline-offset:-1px}
  .axis{display:flex;justify-content:space-between;margin-top:10px;color:var(--muted);font-size:11.5px}
  .chart-read{margin-top:9px;text-align:center;color:var(--gold-soft);font-size:13.5px;min-height:1.2em;font-variant-numeric:tabular-nums}
  /* Zdroje návštěv */
  .srcrow{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--line)}
  .srcrow:last-child{border-bottom:none}
  .srcrow .name{flex:1}
  .srcbar{height:6px;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--rose));min-width:6px}
  .srcrow .cnt{color:var(--muted);font-variant-numeric:tabular-nums;min-width:38px;text-align:right}
  /* Zařízení */
  .device{display:flex;gap:18px;align-items:center;justify-content:center;padding:6px 0}
  .device .d{text-align:center}
  .device .d .v{font-family:'Cormorant Garamond';font-weight:600;font-size:28px;color:var(--cream)}
  .device .d .l{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .donut{width:110px;height:110px}

  /* Řazení produktů (převzato z původní administrace) */
  .tahatko{cursor:grab;color:var(--muted);padding:0 4px;user-select:none;font-size:16px}
  tr.vybrano td{background:rgba(200,164,92,.18)}
  tr.taha{opacity:.45}
  tr.nad td{border-top:2px solid var(--gold)}
  .vyber-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:13px}
  .vyber-bar b{color:var(--gold-soft)}
  .pozn{color:var(--muted);font-size:12.5px}

  /* Média produktu (fotky/videa) */
  .media{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px}
  .thumb{position:relative;width:96px;height:96px;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--bg2)}
  .thumb img,.thumb video{width:100%;height:100%;object-fit:cover;display:block}
  .thumb .hl{position:absolute;top:3px;left:3px;background:var(--gold);color:#20130a;font-size:10px;padding:1px 6px;border-radius:4px;letter-spacing:.04em}
  .thumb .ctrl{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:space-between;background:rgba(38,56,46,.78)}
  .thumb .ctrl button{background:none;border:none;color:#fff;font-size:13px;padding:3px 8px;cursor:pointer}
  .upl{width:96px;height:96px;border:1px dashed var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:12.5px;color:var(--muted);cursor:pointer;padding:4px}
  .upl:hover{background:#fffdf6}
  .stav-upl{font-size:12px;color:var(--muted);margin-top:6px;min-height:1.1em}

  .loader{padding:50px;text-align:center;color:var(--muted)}
  @media(max-width:760px){
    .shell{grid-template-columns:1fr}
    .side{position:static;height:auto;border-right:none;border-bottom:1px solid var(--line)}
    main{padding:20px 16px 50px}
    .modal .grid2{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="mark">Oáza Adamanthea</div>
    <h1>Administrace</h1>
    <div class="field"><input id="heslo" type="password" placeholder="Heslo" autocomplete="current-password"></div>
    <button class="btn" style="width:100%;margin-top:12px" onclick="prihlasit()">Vstoupit</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="shell">
    <aside class="side">
      <div class="brand">Oáza<small>Crystal &amp; Retreat centrum</small></div>
      <nav class="nav" id="nav"></nav>
      <button class="logout" onclick="odhlasit()">Odhlásit</button>
      <div class="muted" style="text-align:center;font-size:11px;margin-top:10px;letter-spacing:.04em">verze 7. 7. 2026 · F</div>
    </aside>
    <main id="main"><div class="loader">Načítám…</div></main>
  </div>
</div>

<div id="toasts"></div>
<div id="modalRoot"></div>

<script>
// ---------- Stav & jádro ----------
console.log('Oáza admin — verze 7. 7. 2026 · F');
const S = { heslo: sessionStorage.getItem('oaza_admin_heslo') || '', view: 'prehled', prehled: null, kategorie: null };

const NAV = [
  { grp:'' },
  { id:'prehled', t:'Přehled' },
  { grp:'Obchod' },
  { id:'objednavky', t:'Objednávky', badge:'obj_k_vyrizeni' },
  { id:'produkty', t:'Produkty' },
  { id:'kategorie', t:'Kategorie' },
  { id:'slevy', t:'Slevové kódy' },
  { grp:'Program' },
  { id:'akce', t:'Akce' },
  { id:'prihlasky', t:'Přihlášky', badge:'prihlasky_ceka' },
  { grp:'Statistiky' },
  { id:'navstevnost', t:'Návštěvnost' },
  { id:'tatvy', t:'Tatvy' },
  { id:'zdravi', t:'Zdraví systému' },
];

const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const $ = s => document.querySelector(s);
function fmtDate(d){ if(!d) return '—'; const x=new Date(d); return x.toLocaleDateString('cs-CZ',{day:'numeric',month:'numeric',year:'numeric'}); }
function fmtDT(d){ if(!d) return '—'; const x=new Date(d); return x.toLocaleString('cs-CZ',{day:'numeric',month:'numeric',hour:'2-digit',minute:'2-digit'}); }
function fmtCena(n,m){ if(n==null||n==='') return '—'; const mena=(m||'CZK').toUpperCase(); return new Intl.NumberFormat('cs-CZ').format(n)+' '+(mena==='EUR'?'€':'Kč'); }
function relCas(d){ if(!d) return '—'; const s=(Date.now()-new Date(d).getTime())/1000; if(s<90) return 'před chvílí'; if(s<5400) return 'před '+Math.round(s/60)+' min'; if(s<172800) return 'před '+Math.round(s/3600)+' h'; return 'před '+Math.round(s/86400)+' dny'; }

async function api(action, opts={}){
  const { params, body, method } = opts;
  const usp = new URLSearchParams({ action, ...(params||{}) });
  const res = await fetch('/api/admin?'+usp.toString(), {
    method: method || (body ? 'POST' : 'GET'),
    headers: { 'x-admin-heslo': S.heslo, 'Content-Type':'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  let data=null; try{ data=await res.json(); }catch{}
  if(res.status===401){ odhlasit(); throw new Error('Neplatné heslo'); }
  if(!res.ok){ throw new Error((data&&data.chyba)||('Chyba '+res.status)); }
  return data;
}

function toast(msg,type){ const t=document.createElement('div'); t.className='toast '+(type||''); t.textContent=msg; $('#toasts').appendChild(t); setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},3200); }

// ---------- Modaly ----------
function modal(html){
  const root=$('#modalRoot');
  root.innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;
}
function closeModal(){ $('#modalRoot').innerHTML=''; }
function confirmAkce(text, onYes, btnLabel='Potvrdit', danger=false){
  modal(`<h2>${esc(text)}</h2><div class="foot"><button class="btn ghost" onclick="closeModal()">Zavřít</button><button class="btn ${danger?'danger':''}" id="cf">${esc(btnLabel)}</button></div>`);
  $('#cf').onclick=async()=>{ $('#cf').disabled=true; try{ await onYes(); closeModal(); }catch(e){ toast(e.message,'err'); $('#cf').disabled=false; } };
}

// ---------- Přihlášení ----------
async function prihlasit(){
  const h=$('#heslo').value.trim(); if(!h) return;
  S.heslo=h;
  try{ await api('prehled'); sessionStorage.setItem('oaza_admin_heslo',h); startApp(); }
  catch(e){ $('#loginErr').textContent = e.message.includes('heslo')?'Neplatné heslo.':e.message; S.heslo=''; }
}
$('#heslo').addEventListener('keydown',e=>{ if(e.key==='Enter') prihlasit(); });
function odhlasit(){ sessionStorage.removeItem('oaza_admin_heslo'); S.heslo=''; $('#app').style.display='none'; $('#login').style.display='flex'; $('#loginErr').textContent=''; $('#heslo').value=''; }

async function startApp(){
  $('#login').style.display='none'; $('#app').style.display='block';
  await nactiPrehled();
  go('prehled');
}
async function nactiPrehled(){ try{ S.prehled=await api('prehled'); }catch{} renderNav(); }

function renderNav(){
  const p=S.prehled||{};
  $('#nav').innerHTML = NAV.map(n=>{
    if(n.grp!==undefined) return n.grp?`<div class="navgrp">${esc(n.grp)}</div>`:'';
    const b = n.badge && p[n.badge] ? `<span class="badge">${p[n.badge]}</span>` : '';
    return `<a data-v="${n.id}" class="${S.view===n.id?'active':''}" onclick="go('${n.id}')">${esc(n.t)}${b}</a>`;
  }).join('');
}

function go(v){ S.view=v; renderNav(); render(); }

// ---------- Router ----------
const VIEWS={};
async function render(){
  const main=$('#main'); main.innerHTML='<div class="loader">Načítám…</div>';
  try{ await VIEWS[S.view](main); }
  catch(e){ main.innerHTML=`<div class="topline"><h1>Chyba</h1></div><div class="panel"><div class="body"><p style="color:var(--bad)">${esc(e.message)}</p></div></div>`; }
}
function hlavicka(title, sub, actions){ return `<div class="topline"><div><h1>${esc(title)}</h1>${sub?`<div class="sub">${sub}</div>`:''}</div><div>${actions||''}</div></div>`; }

// ============ PŘEHLED ============
VIEWS.prehled = async (main)=>{
  const p = S.prehled || await api('prehled'); S.prehled=p;
  main.innerHTML = hlavicka('Přehled', 'Vítej zpět. Tady je dnešní obraz Oázy.') + `
    <div class="kpis">
      <div class="kpi click" onclick="go('objednavky')"><div class="lab">Objednávky k vyřízení</div><div class="val">${p.obj_k_vyrizeni||0}</div></div>
      <div class="kpi click" onclick="go('prihlasky')"><div class="lab">Přihlášky čekají na platbu</div><div class="val">${p.prihlasky_ceka||0}</div></div>
      <div class="kpi click" onclick="go('navstevnost')"><div class="lab">Návštěvy dnes</div><div class="val">${p.dnes_navstev||0}</div><div class="muted" style="font-size:12px">${p.dnes_relace||0} relací</div></div>
      <div class="kpi click" onclick="go('akce')"><div class="lab">Aktivní akce</div><div class="val">${p.akce_aktivni||0}</div></div>
      <div class="kpi click" onclick="go('zdravi')"><div class="lab">Zdraví systému</div><div class="val small"><span class="pill ${p.zdravi_ok?'ok':'warn'}">${p.zdravi_ok?'V pořádku':'Zkontrolovat'}</span></div></div>
    </div>
    <div class="panel"><div class="head"><h3>Rychlé kroky</h3></div><div class="body">
      <div class="rowacts" style="justify-content:flex-start;gap:10px">
        <button class="btn ghost sm" onclick="go('objednavky')">Objednávky</button>
        <button class="btn ghost sm" onclick="produktModal()">Nový produkt</button>
        <button class="btn ghost sm" onclick="akceModal()">Nová akce</button>
        <button class="btn ghost sm" onclick="slevaModal()">Nový slevový kód</button>
        <button class="btn ghost sm" onclick="go('navstevnost')">Statistiky návštěv</button>
      </div>
    </div></div>`;
};

// ============ OBJEDNÁVKY ============
const OBJ_STAV = { nova:'Čeká na platbu', zaplaceno:'Zaplaceno', odeslano:'Odesláno', doruceno:'Doručeno', zruseno:'Zrušeno' };
function objPill(s){ const cls = s==='zaplaceno'||s==='doruceno'?'ok':(s==='zruseno'?'bad':(s==='odeslano'?'gold':'warn')); return `<span class="pill ${cls}">${esc(OBJ_STAV[s]||s||'—')}</span>`; }
// ---- Doprava: čitelný přehled (kam a jakou formou) ----
const DOPRAVA_LABEL = { vydejni_misto:'Zásilkovna – výdejní místo', na_adresu:'Zásilkovna – na adresu', adresa:'Zásilkovna – na adresu', mezi_nami:'Mezi námi', digital:'Digitální (bez zásilky)' };
function dorukShrnuti(o){
  const pp = o.packeta_point || {};
  const adr = o.adresa || {};
  const typ = o.doprava || pp.typ || '';
  let cil='—', cilLabel='Doručení';
  if(typ==='vydejni_misto'){ cilLabel='Výdejní místo'; cil = pp.text || '—'; }
  else if(typ==='na_adresu' || typ==='adresa'){ cilLabel='Adresa'; cil = [adr.ulice,adr.mesto,adr.psc,adr.zeme].filter(Boolean).join(', ') || '—'; }
  else if(typ==='mezi_nami'){ cilLabel='Podací kód'; cil = pp.kod ? String(pp.kod) : 'čeká na podací kód od zákazníka'; }
  else if(typ==='digital'){ cilLabel='Doručení'; cil = 'bez zásilky (digitální produkt)'; }
  return { typ, metoda: DOPRAVA_LABEL[typ] || typ || '—', cil, cilLabel };
}

// ============ PRODUKTY ============
const PROD_STAV={skladem:'Skladem',prodano:'Prodáno',skryto:'Skryto'};
const prodState={q:'',stav:'',kategorie:''};
let VYBRANE=new Set(), dragId=null;
// neskladem (prodáno/skryto) řadíme na konec, jinak podle pořadí — převzato z původní administrace
const stavRank=p=>p.stav==='skladem'?0:1;
function seradProd(){ (window._prod||[]).sort((a,b)=> stavRank(a)-stavRank(b) || (a.poradi||0)-(b.poradi||0)); }

VIEWS.produkty = async (main)=>{
  if(!S.kategorie){ try{ S.kategorie=(await api('kategorie')).polozky; }catch{ S.kategorie=[]; } }
  main.innerHTML = hlavicka('Produkty', null, `<button class="btn" onclick="produktModal()">Nový produkt</button>`) + `
    <div class="panel"><div class="body"><div class="toolbar">
      <input id="pQ" placeholder="Hledat název / slug…" style="min-width:220px" value="${esc(prodState.q)}">
      <select id="pKat" onchange="prodFiltr()"><option value="">Všechny kategorie</option>${(S.kategorie||[]).map(k=>`<option value="${esc(k.slug)}" ${prodState.kategorie===k.slug?'selected':''}>${esc(k.nazev)}</option>`).join('')}</select>
      <select id="pStav" onchange="prodFiltr()"><option value="">Všechny stavy</option>${Object.entries(PROD_STAV).map(([k,v])=>`<option value="${k}" ${prodState.stav===k?'selected':''}>${v}</option>`).join('')}</select>
      <div class="grow"></div><span id="pInfo" class="muted"></span>
    </div>
    <div id="vyberBar"></div>
    <div id="prodList" class="tbl-wrap"><div class="loader">Načítám…</div></div></div></div>`;
  $('#pQ').addEventListener('input',prodFiltr);
  await loadProd();
};
async function loadProd(){
  const d=await api('produkty',{params:{per:1000,page:1}});
  window._prod=d.polozky||[];
  seradProd(); VYBRANE.clear();
  renderProdSeznam();
}
function prodFiltr(){
  prodState.q=($('#pQ')?.value||'').trim().toLowerCase();
  prodState.kategorie=$('#pKat')?.value||'';
  prodState.stav=$('#pStav')?.value||'';
  VYBRANE.clear();
  renderProdSeznam();
}
function reorderPovolen(){ return !prodState.q && !prodState.stav && !prodState.kategorie; }
function renderProdSeznam(){
  const el=$('#prodList'); if(!el) return;
  const vse=window._prod||[];
  const list=vse.filter(p=>{
    if(prodState.stav && p.stav!==prodState.stav) return false;
    if(prodState.kategorie && p.kategorie!==prodState.kategorie) return false;
    if(prodState.q){ const q=prodState.q; if(!((p.nazev||'').toLowerCase().includes(q)||(p.slug||'').toLowerCase().includes(q)||(p.stitek||'').toLowerCase().includes(q))) return false; }
    return true;
  });
  if($('#pInfo')) $('#pInfo').textContent=`${list.length} / ${vse.length} produktů`;
  if(!list.length){ el.innerHTML='<div class="empty"><div class="big">Nic nenalezeno</div>Zkus jiný filtr, nebo přidej nový produkt.</div>'; renderVyberBar(); return; }
  const lzeTahat=reorderPovolen(); // řazení jen bez filtru — jako v původní administraci
  el.innerHTML=(lzeTahat?'<p class="pozn" style="margin-bottom:8px">Zaškrtni produkty a přesuň je naráz (přetažením nebo tlačítky nahoře). Jednotlivě chyť za ⠿ a přetáhni. Šipky ↑↓ prohodí se sousedem.</p>':'<p class="pozn" style="margin-bottom:8px">Řazení je dostupné bez zapnutého hledání a filtrů.</p>')+
  `<table><thead><tr><th></th>${lzeTahat?'<th></th>':''}<th></th><th>Název</th><th>Kategorie</th><th class="num">Cena</th><th>Stav</th><th></th></tr></thead><tbody>${
    list.map(p=>{
      const foto=Array.isArray(p.fotky)&&p.fotky[0]?p.fotky[0]:'';
      const vyb=VYBRANE.has(p.id);
      return `<tr data-id="${p.id}" class="${vyb?'vybrano':''}" ${lzeTahat?'draggable="true"':''}>
      <td><input type="checkbox" class="vyber-check" ${vyb?'checked':''} title="Vybrat" onclick="event.stopPropagation()" onchange="prepniVyber('${p.id}',this.checked)"></td>
      ${lzeTahat?'<td><span class="tahatko" title="Přetáhni">⠿</span></td>':''}
      <td>${foto?`<img src="${esc(foto)}" style="width:40px;height:40px;object-fit:cover;border-radius:6px">`:'<div style="width:40px;height:40px;border-radius:6px;background:var(--bg2)"></div>'}</td>
      <td>${esc(p.nazev)}${p.doporucujeme?' <span class="pill gold">★</span>':''}${p.digitalni?' <span class="pill">digitál</span>':''}<div class="muted" style="font-size:12px">${esc(p.slug)}</div></td>
      <td class="muted">${esc(p.kategorie||'—')}</td>
      <td class="num">${fmtCena(p.cena,p.mena)}${p.cena_eur?`<div class="muted" style="font-size:12px">${p.cena_eur} €</div>`:''}</td>
      <td><span class="pill ${p.stav==='skladem'?'ok':(p.stav==='prodano'?'gold':'')}">${PROD_STAV[p.stav]||p.stav}</span>${p.rezervovano_do&&new Date(p.rezervovano_do)>new Date()?' <span class="pill warn">rezerv.</span>':''}</td>
      <td class="rowacts">
        ${lzeTahat?`<button class="btn ghost sm" title="Nahoru" onclick="posun('${p.id}',-1)">↑</button><button class="btn ghost sm" title="Dolů" onclick="posun('${p.id}',1)">↓</button>`:''}
        ${p.stav==='skladem'?`<button class="btn ghost sm" onclick="prodSkryt('${p.id}',true)">Skrýt</button>`:p.stav==='skryto'?`<button class="btn ghost sm" onclick="prodSkryt('${p.id}',false)">Zobrazit</button>`:''}
        <button class="btn ghost sm" onclick="produktModal('${p.id}')">Upravit</button>
      </td>
    </tr>`;}).join('')}</tbody></table>`;
  renderVyberBar();
  if(lzeTahat) wireDnd();
}

/* výběr produktů — převzato z původní administrace */
function renderVyberBar(){
  const bar=$('#vyberBar'); if(!bar) return;
  const n=VYBRANE.size;
  if(!n){ bar.innerHTML=''; return; }
  bar.innerHTML=`<div class="vyber-bar"><span><b>${n}</b> vybráno</span>
    <button class="btn ghost sm" onclick="presunVyber('start')">↑ Na začátek</button>
    <button class="btn ghost sm" onclick="presunVyber('end')">↓ Na konec</button>
    <button class="btn ghost sm" onclick="zrusVyber()">Zrušit výběr</button>
    <span class="pozn">…nebo chyť vybraný produkt a přetáhni, kam chceš</span></div>`;
}
function prepniVyber(id,on){
  if(on)VYBRANE.add(id); else VYBRANE.delete(id);
  const row=document.querySelector(`#prodList tr[data-id="${id}"]`); if(row)row.classList.toggle('vybrano',on);
  renderVyberBar();
}
function zrusVyber(){ VYBRANE.clear(); renderProdSeznam(); }
function presunVyber(t){ if(VYBRANE.size) provedPresun([...VYBRANE],t); }

/* drag & drop řazení — umí přesunout i celý výběr */
function wireDnd(){
  document.querySelectorAll('#prodList tr[draggable]').forEach(row=>{
    row.addEventListener('dragstart',()=>{dragId=row.dataset.id;row.classList.add('taha');});
    row.addEventListener('dragend',()=>{dragId=null;row.classList.remove('taha');
      document.querySelectorAll('#prodList tr').forEach(r=>r.classList.remove('nad'));});
    row.addEventListener('dragover',e=>{e.preventDefault();
      document.querySelectorAll('#prodList tr').forEach(r=>r.classList.remove('nad'));row.classList.add('nad');});
    row.addEventListener('drop',e=>{e.preventDefault();row.classList.remove('nad');pustit(row.dataset.id);});
  });
}
function pustit(cilId){
  if(!dragId) return;
  const ids=(VYBRANE.size && VYBRANE.has(dragId)) ? [...VYBRANE] : [dragId];
  provedPresun(ids, cilId);
}
// přesune skupinu id na cíl ('start' | 'end' | id cílového produktu), přečísluje a uloží
function provedPresun(ids, cil){
  if(!ids.length) return;
  const set=new Set(ids);
  if(typeof cil==='string' && cil!=='start' && cil!=='end' && set.has(cil)) return;
  const P=window._prod||[];
  const presouvane=P.filter(p=>set.has(p.id));
  const zbytek=P.filter(p=>!set.has(p.id));
  let idx = cil==='start' ? 0 : cil==='end' ? zbytek.length : zbytek.findIndex(p=>p.id===cil);
  if(idx<0) idx=zbytek.length;
  const nove=[...zbytek.slice(0,idx),...presouvane,...zbytek.slice(idx)];
  nove.forEach((p,i)=>p.poradi=i+1);
  window._prod=nove;
  seradProd();
  VYBRANE.clear();
  renderProdSeznam();
  ulozPoradi(window._prod);
}
async function ulozPoradi(polozky){
  try{
    const data=polozky.map(p=>({id:p.id,slug:p.slug,nazev:p.nazev,cena:p.cena,poradi:p.poradi||0}));
    await api('produkty_poradi',{body:{polozky:data}});
    toast('Pořadí uloženo.','ok');
  }catch(e){ toast('Chyba ukládání: '+e.message,'err'); }
}
// posun pořadí šipkou: prohodí pořadí se sousedem (nahoru = dřív)
async function posun(id,smer){
  const P=window._prod||[];
  const idx=P.findIndex(x=>x.id===id); if(idx<0)return;
  const j=idx+smer; if(j<0||j>=P.length){toast('Už je na kraji.');return;}
  const a=P[idx], b=P[j];
  if((a.poradi||0)===(b.poradi||0)){
    // shodná pořadí (výchozí 0) — prohodíme v poli a přečíslujeme celý seznam
    P[idx]=b; P[j]=a;
    P.forEach((p,i)=>p.poradi=i+1);
    renderProdSeznam();
    try{ await ulozPoradiTiche(P); toast('Pořadí uloženo.','ok'); }catch(e){ toast('Chyba: '+e.message,'err'); }
    return;
  }
  const t=a.poradi; a.poradi=b.poradi; b.poradi=t;
  seradProd();
  renderProdSeznam();
  try{ await ulozPoradiTiche([a,b]); }catch(e){ toast('Chyba: '+e.message,'err'); }
}
async function ulozPoradiTiche(polozky){
  const data=polozky.map(p=>({id:p.id,slug:p.slug,nazev:p.nazev,cena:p.cena,poradi:p.poradi||0}));
  await api('produkty_poradi',{body:{polozky:data}});
}
async function prodSkryt(id,skryt){
  try{ await api('produkt_ulozit',{body:{id,stav:skryt?'skryto':'skladem'}});
    const p=(window._prod||[]).find(x=>x.id===id); if(p)p.stav=skryt?'skryto':'skladem';
    seradProd(); renderProdSeznam();
    toast(skryt?'Produkt skrytý z obchodu.':'Produkt zobrazený v obchodě.','ok');
  }catch(e){ toast(e.message,'err'); }
}

// zmenšení obrázku v prohlížeči (max strana 1600 px, JPEG ~0.82) — převzato 1:1
function zmensi(file){
  return new Promise((res,rej)=>{
    const img=new Image();const url=URL.createObjectURL(file);
    img.onload=()=>{
      const max=1600;let{width:w,height:h}=img;
      if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);URL.revokeObjectURL(url);
      c.toBlob(b=>b?res(b):rej(new Error('Zmenšení selhalo')),'image/jpeg',0.82);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error('Nelze načíst obrázek'));};
    img.src=url;
  });
}
async function uploadBlob(blob,slug,ext){
  const {uploadUrl,publicUrl}=await api('upload_url',{body:{slug,ext}});
  const r=await fetch(uploadUrl,{method:'PUT',headers:{'content-type':blob.type,'x-upsert':'true','cache-control':'max-age=31536000'},body:blob});
  if(!r.ok)throw new Error('Upload selhal ('+r.status+')');
  return publicUrl;
}

  const slug=($('#f_nazev').value.trim()||'produkt');
  const st=$('#stav_fotky');let n=0;
  for(const f of files){
    n++;st.textContent=`Nahrávám fotku ${n}/${files.length}…`;
    try{const b=await zmensi(f);const url=await uploadBlob(b,slug,'jpg');MFOTKY.push(url);renderMedia();}
    catch(e){st.textContent='Chyba: '+e.message;return;}
  }
  st.textContent='Hotovo.';setTimeout(()=>{if($('#stav_fotky'))$('#stav_fotky').textContent='';},2000);

async function nahrajVideo(file){

    MVIDEA.push(url);renderMedia();st.textContent='Hotovo.';setTimeout(()=>{if($('#stav_videa'))$('#stav_videa').textContent='';},2000);}

}
async function nahrajSoubor(file){

    if(!r.ok)throw new Error('Upload selhal ('+r.status+')');

let PRIHL_SBALENE=new Set();
VIEWS.prihlasky = async (main)=>{

function radekPrihlasky(p, past, grpKey, sbaleno, ukazAkci){
  return `<tr class="${past?'past':''}" data-grp="${grpKey}" style="${sbaleno?'display:none':''}">
      <td>${p.vs||'—'}</td>
      <td>${esc(p.jmeno)}<div class="muted" style="font-size:12px">${esc(p.email||'')} ${p.telefon?('· '+esc(p.telefon)):''}</div>${ukazAkci&&p.akce_nazev?`<div class="muted" style="font-size:12px">${esc(p.akce_nazev)}</div>`:''}${p.poznamka?`<div style="font-size:12.5px;color:var(--gold-soft);margin-top:2px">„${esc(p.poznamka)}"</div>`:''}</td>
      <td>${p.pocet_osob||1}</td>
      <td class="num">${fmtCena(p.castka,p.mena)}</td>
      <td><span class="pill ${p.stav_platby==='zaplaceno'?'ok':(p.stav_platby==='zruseno'?'bad':(p.stav_platby==='ceka_na_platbu'?'warn':'gold'))}">${PRIHL_STAV[p.stav_platby]||p.stav_platby}</span></td>
      <td class="muted">${fmtDT(p.vytvoreno)}</td>
      <td class="rowacts"><button class="btn ghost sm" onclick='prihlDetail(${JSON.stringify(p.id)})'>Detail</button></td>
    </tr>`;
}
async function loadPrihl(){
  prihState.akce_id=$('#phAkce')?$('#phAkce').value:prihState.akce_id;
  prihState.stav_platby=$('#phStav')?$('#phStav').value:prihState.stav_platby;
  const params={}; if(prihState.akce_id)params.akce_id=prihState.akce_id; if(prihState.stav_platby)params.stav_platby=prihState.stav_platby;
  const d=await api('prihlasky',{params}); window._prihl=d.polozky||[];
  const el=$('#prihlList'); if(!el) return;
  if($('#phInfo')) $('#phInfo').textContent=`${d.polozky.length} přihlášek`;
  if(!d.polozky.length){ el.innerHTML='<div class="empty"><div class="big">Žádné přihlášky</div></div>'; return; }

  // seskupení podle akcí
  const metaMap={}; for(const a of (window._akce||[])) metaMap[a.id]=a;
  const skupiny={};
  for(const p of d.polozky){
    const meta=p.akce_id?metaMap[p.akce_id]:null;
    const key=meta?p.akce_id:'ostatni';
    (skupiny[key]=skupiny[key]||{meta,polozky:[]}).polozky.push(p);
  }
  const vsechny=Object.entries(skupiny).map(([key,g])=>({key,...g}));
  const budouci=vsechny.filter(g=>g.meta&&!akceProbehla(g.meta)).sort((a,b)=>String(a.meta.datum_od||'9999').localeCompare(String(b.meta.datum_od||'9999')));
  const probehle=vsechny.filter(g=>g.meta&&akceProbehla(g.meta)).sort((a,b)=>String(akceKonec(b.meta)).localeCompare(String(akceKonec(a.meta))));
  const ostatni=vsechny.filter(g=>!g.meta);
  const serazene=[...budouci,...probehle,...ostatni];

  // výchozí sbalení: proběhlé sbalené; při zapnutém filtru stavu vše rozbalené
  PRIHL_SBALENE=new Set();
  if(!prihState.stav_platby) for(const g of probehle) PRIHL_SBALENE.add(g.key);

  const hlavickaSkup=(g)=>{
    const past=g.meta?akceProbehla(g.meta):false;
    const nazev=g.meta?g.meta.nazev:'Ostatní / bez přiřazené akce';
    const termin=g.meta?(g.meta.datum_text||fmtDate(g.meta.datum_od)):'';
    const osob=g.polozky.reduce((s,p)=>s+(p.pocet_osob||1),0);
    const ceka=g.polozky.filter(p=>p.stav_platby==='ceka_na_platbu').length;
    const sb=PRIHL_SBALENE.has(g.key);
    return `<tr class="grp" onclick="prehniSkupinu('${g.key}')"><td colspan="7">
      <span class="caret" id="caret-${g.key}">${sb?'▸':'▾'}</span>${esc(nazev)}
      ${termin?`<span class="muted" style="font-weight:400"> · ${esc(termin)}</span>`:''}
      ${past?' <span class="pill">proběhlá</span>':''}
      <span class="muted" style="font-weight:400"> — ${g.polozky.length} přihlášek · ${osob} osob</span>
      ${ceka?` <span class="pill warn">${ceka} čeká na platbu</span>`:''}
    </td></tr>`;
  };

  el.innerHTML=`<table><thead><tr><th>VS</th><th>Jméno</th><th>Osob</th><th class="num">Částka</th><th>Stav</th><th>Přišlo</th><th></th></tr></thead><tbody>${
    serazene.map(g=>{
      const past=g.meta?akceProbehla(g.meta):false;
      const sb=PRIHL_SBALENE.has(g.key);
      return hlavickaSkup(g)+g.polozky.map(p=>radekPrihlasky(p,past,g.key,sb,!g.meta)).join('');
    }).join('')}</tbody></table>`;
}
function prehniSkupinu(key){
  const sb=PRIHL_SBALENE.has(key);
  if(sb)PRIHL_SBALENE.delete(key); else PRIHL_SBALENE.add(key);
  document.querySelectorAll(`#prihlList tr[data-grp="${key}"]`).forEach(r=>r.style.display=sb?'':'none');
  const c=document.getElementById('caret-'+key); if(c)c.textContent=sb?'▾':'▸';
}

// ============ NÁVŠTĚVNOST ============
let navDny='30';
function fmtDoba(s){
  s=Math.round(s||0);
  if(s<60) return s+' s';
  const m=Math.floor(s/60), r=s%60;
  if(m<60) return m+' min '+(r?r+' s':'');
  const hh=Math.floor(m/60);
  return hh+' h '+(m%60)+' min';
}
// Klepnutí (i najetí) na sloupec vypíše hodnotu — celý sloupec je klikací, funguje i na mobilu
function ctiSloupec(el, readId){
  const r=document.getElementById(readId); if(!r) return;
  r.textContent=el.dataset.l||'';
  const ch=el.closest('.chart'); if(ch) ch.querySelectorAll('.barcol.act').forEach(b=>b.classList.remove('act'));
  el.classList.add('act');
}
function graf(rada, readId, slovo){
  if(!rada||!rada.length) return '<div class="empty">Zatím žádná data</div>';
  slovo=slovo||'návštěv';
  const max=Math.max(1,...rada.map(r=>r.navstev));
  const bary=rada.map(x=>{
    const v=x.navstev||0;
    const vys=v?Math.max(2,(v/max)*100):0;
    const lbl=`${x.den}: ${v} ${slovo}`;
    return `<div class="barcol" data-l="${esc(lbl)}" onclick="ctiSloupec(this,'${readId}')" onmouseenter="ctiSloupec(this,'${readId}')"><div class="bar ${v?'':'zero'}" style="height:${vys||2}%"></div></div>`;
  }).join('');
  const peak=rada.reduce((a,b)=>(b.navstev||0)>(a.navstev||0)?b:a,{den:'',navstev:0});
  const vychozi=peak.navstev?`Špička: ${peak.den} — ${peak.navstev} ${slovo} · klepni na sloupec`:'Klepni na sloupec pro detail';
  const prvni=rada[0]?.den||'', posl=rada[rada.length-1]?.den||'';
  return `<div class="chart">${bary}</div><div class="axis"><span>${esc(prvni)}</span><span>${esc(posl)}</span></div><div class="chart-read" id="${readId}">${esc(vychozi)}</div>`;
}

    </div>
    <div class="panel"><div class="head"><h3>Naplánované úlohy (cron)</h3></div><div class="tbl-wrap"><table><thead><tr><th>Úloha</th><th>Plán</th><th>Aktivní</th><th>Poslední běh</th><th>Kdy</th></tr></thead><tbody>${cronRows||'<tr><td colspan="5"><div class="empty">Žádné úlohy</div></td></tr>'}</tbody></table></div></div>
    <div class="panel"><div class="head"><h3>Airtable cache</h3></div><div class="tbl-wrap"><table><thead><tr><th>Klíč</th><th>Stav</th><th>Obnoveno</th></tr></thead><tbody>${cacheRows||'<tr><td colspan="3"><div class="empty">Prázdné</div></td></tr>'}</tbody></table></div></div>
    <div class="panel"><div class="body"><div class="kv">
      <div class="k">Objednávky</div><div>${objSum}</div>
      <div class="k">Produkty</div><div>${prodSum}</div>
      <div class="k">Aktivní akce</div><div>${z.akce_aktivni||0}</div>
      <div class="k">Kontrola</div><div class="muted">${fmtDT(z.cas)}</div>
    </div></div></div>`;
};

// responsivní dualcol
const mq=window.matchMedia('(max-width:900px)');
function fixDual(){ document.querySelectorAll('.dualcol').forEach(d=>{ d.style.gridTemplateColumns = mq.matches?'1fr':'1fr 1fr'; }); }
mq.addEventListener('change',fixDual);
const _origRender=render; render=async function(){ await _origRender(); fixDual(); };

// ---------- Start ----------
if(S.heslo){ (async()=>{ try{ await api('prehled'); startApp(); }catch{ odhlasit(); } })(); }
</script>
</body>
</html>
