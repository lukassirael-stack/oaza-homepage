<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pokladna — Oáza Adamanthea</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --slonovina:#F6F1E7; --slonovina2:#EFE8D8; --karta:#FBF8F1;
    --namornicka:#1B2A41; --namornicka2:#33486A; --zlata:#B8924A; --zlata2:#D9BC7E;
    --tlumeny:#7A715F; --cervena:#9C4A3C; --linka:#E2D6BC;
  }
  *{box-sizing:border-box}
  body{background:var(--slonovina);color:var(--namornicka);font-family:'EB Garamond',Georgia,serif;line-height:1.6;margin:0}
  .wrap{max-width:1040px;margin:0 auto;padding:0 22px}
  .kosik-btn{display:none!important}

  header{text-align:center;padding:40px 0 14px}
  .eyebrow{font-family:'Cinzel',serif;font-size:.74rem;letter-spacing:.42em;text-transform:uppercase;color:var(--zlata)}
  header h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:2.6rem;margin:.18em 0 .1em}
  .hvezda{display:flex;align-items:center;justify-content:center;gap:14px;margin:6px 0 0;color:var(--zlata)}
  .hvezda::before,.hvezda::after{content:"";height:1px;width:min(120px,22vw);background:linear-gradient(90deg,transparent,var(--zlata))}
  .hvezda::after{transform:scaleX(-1)}
  .zpet{display:block;text-align:center;color:var(--zlata);font-style:italic;text-decoration:none;margin:4px 0 10px;font-size:.95rem}

  .grid{display:grid;grid-template-columns:1.2fr .9fr;gap:34px;padding:18px 0 70px;align-items:start}
  .karta{background:var(--karta);border:1px solid var(--linka);border-radius:14px;padding:22px 22px}
  .karta h2{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:1.5rem;margin:0 0 14px}
  .pole{margin-bottom:14px}
  .pole label{display:block;font-family:'Cinzel',serif;font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--tlumeny);margin-bottom:5px}
  .pole input,.pole textarea{width:100%;padding:10px 12px;border:1px solid var(--linka);background:var(--slonovina);border-radius:9px;
    font-family:'EB Garamond',serif;font-size:1rem;color:var(--namornicka)}
  .pole input:focus,.pole textarea:focus{outline:none;border-color:var(--zlata)}
  .dvoji{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  .volby{display:flex;gap:10px;flex-wrap:wrap}
  .volba{flex:1;min-width:130px;border:1px solid var(--linka);background:var(--slonovina);border-radius:10px;padding:12px 14px;cursor:pointer;transition:.15s}
  .volba.akt{border-color:var(--zlata);background:#fff;box-shadow:0 0 0 1px var(--zlata) inset}
  .volba .nadpis{font-family:'Cinzel',serif;font-size:.74rem;letter-spacing:.08em;text-transform:uppercase}
  .volba .pod{color:var(--tlumeny);font-size:.9rem;font-style:italic}
  .pozn-doprava{color:var(--tlumeny);font-size:.9rem;font-style:italic;margin-top:8px}
  .btn-vybrat{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--zlata);background:#fff;color:var(--namornicka2);border-radius:10px;padding:11px 16px;cursor:pointer;font-family:'Cinzel',serif;font-size:.74rem;letter-spacing:.06em;text-transform:uppercase;transition:.15s}
  .btn-vybrat:hover{background:var(--zlata);color:#fff}
  .packeta-vybrano{margin-top:10px;padding:10px 14px;border-radius:10px;background:#f3f7f1;border:1px solid #cfe0c8;color:var(--namornicka2);font-size:.95rem}
  .packeta-vybrano b{color:#3f6b46}

  .mena-prep{display:inline-flex;border:1px solid var(--linka);border-radius:30px;overflow:hidden;float:right}
  .mena-prep button{border:none;background:transparent;padding:6px 13px;cursor:pointer;font-family:'Cinzel',serif;font-size:.76rem;color:var(--namornicka2)}
  .mena-prep button.akt{background:var(--namornicka);color:var(--slonovina)}

  .souhrn-pol{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--linka);font-size:1rem}
  .souhrn-pol .n{flex:1}
  .souhrn-pol .c{color:var(--namornicka2);white-space:nowrap}
  .radek{display:flex;justify-content:space-between;margin-top:10px;color:var(--tlumeny)}
  .celkem{display:flex;justify-content:space-between;align-items:baseline;margin-top:14px;padding-top:14px;border-top:1px solid var(--linka)}
  .celkem b{font-family:'Cormorant Garamond',serif;font-size:1.7rem;color:var(--namornicka)}
  .kod-pole{margin-top:14px}
  .kod-pole label{display:block;font-family:'Cinzel',serif;font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--tlumeny);margin-bottom:5px}
  .kod-radek{display:flex;gap:8px}
  .kod-radek input{flex:1;padding:10px 12px;border:1px solid var(--linka);background:var(--slonovina);border-radius:9px;font-family:'EB Garamond',serif;font-size:1rem;color:var(--namornicka);text-transform:uppercase}
  .kod-radek input:focus{outline:none;border-color:var(--zlata)}
  .kod-radek button{border:1px solid var(--zlata);background:transparent;color:var(--zlata);border-radius:9px;padding:0 16px;cursor:pointer;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
  .kod-radek button:hover{background:var(--zlata);color:#fff}
  .kod-zprava{font-size:.86rem;font-style:italic;margin-top:6px;min-height:1em}
  .kod-zprava.ok{color:#3B7A57}
  .kod-zprava.err{color:var(--cervena)}
  .radek.sleva{color:#3B7A57}

  .tlac{display:block;width:100%;text-align:center;background:var(--namornicka);color:var(--slonovina);border:none;cursor:pointer;
    font-family:'Cinzel',serif;font-size:.84rem;letter-spacing:.12em;text-transform:uppercase;padding:15px;border-radius:8px;margin-top:18px}
  .tlac:hover{background:var(--namornicka2)}
  .tlac:disabled{opacity:.5;cursor:default}
  .chyba{color:var(--cervena);font-size:.92rem;margin-top:10px;text-align:center;font-style:italic}
  .souhlas{color:var(--tlumeny);font-size:.84rem;font-style:italic;margin-top:12px;text-align:center}
  .souhlas a{color:var(--zlata)}

  .platba-info{background:var(--slonovina);border:1px solid var(--linka);border-radius:9px;padding:10px 14px;font-size:.92rem;color:var(--namornicka2)}

  /* potvrzení */
  .hotovo{max-width:560px;margin:0 auto;text-align:center;padding:10px 0 70px}
  .hotovo .znak{font-size:2.4rem;color:var(--zlata)}
  .hotovo h2{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:2rem;margin:.2em 0 .1em}
  .qr-box{background:#fff;border:1px solid var(--linka);border-radius:14px;padding:22px;display:inline-block;margin:18px auto}
  .platdetail{background:var(--karta);border:1px solid var(--linka);border-radius:12px;padding:18px 20px;text-align:left;margin:14px auto;max-width:420px}
  .platdetail div{display:flex;justify-content:space-between;gap:14px;padding:5px 0;border-bottom:1px dashed var(--linka)}
  .platdetail div:last-child{border:none}
  .platdetail .k{color:var(--tlumeny);font-size:.9rem}
  .platdetail .v{font-weight:500;text-align:right}
  .nacitam{text-align:center;color:var(--tlumeny);font-style:italic;padding:50px 0}

  footer{text-align:center;padding:30px 0 50px;color:var(--tlumeny);font-size:.86rem;border-top:1px solid var(--linka)}
  footer a{color:var(--zlata)}

  @media(max-width:760px){ .grid{grid-template-columns:1fr;gap:20px} header h1{font-size:2.2rem} }
</style>
</head>
<body>
<header>
  <div class="eyebrow">Oáza Adamanthea</div>
  <h1>Pokladna</h1>
  <div class="hvezda"><span>✦</span></div>
</header>
<a class="zpet" href="/bali-shop">← Zpět do obchodu</a>

<div class="wrap">
  <div id="obsah">
    <div class="nacitam">Načítám košík…</div>
  </div>
</div>

<footer><div class="wrap">Oáza Adamanthea · <a href="/kontakt">Kontakt</a> · <a href="/obchodni-podminky">Obchodní podmínky</a> · <a href="/gdpr">Ochrana údajů</a></div></footer>

<script src="/kosik.js"></script>
<script src="https://widget.packeta.com/v6/www/js/library.js"></script>
<script>
const PACKETA_API_KEY='54841ac0ac111e66'; // veřejný klíč widgetu (klientská strana)
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let MENA=(localStorage.getItem('oaza_mena')==='eur')?'eur':'czk';
let SHIP=null; // ceny dopravy ze serveru
const STAV={zeme:'CZ', doprava:null, sleva:null, packetaPoint:null}; // doprava: 'vydejni_misto' | 'adresa'; sleva: {kod,typ,hodnota}

const polozky=()=> (window.Kosik?Kosik.polozky():[]);
const vseDigital=()=> { const p=polozky(); return p.length>0 && p.every(x=>x.digitalni); };
const cenaPol=p=> MENA==='eur' ? (p.cena_eur||0) : (p.cena||0);
const fmt=v=> MENA==='eur' ? v.toLocaleString('cs-CZ')+' €' : v.toLocaleString('cs-CZ')+' Kč';
const zbozi=()=> polozky().reduce((s,p)=>s+cenaPol(p),0);

function slevaCastka(){
  const s=STAV.sleva; if(!s||!s.kod) return 0;
  if(s.typ==='procenta') return Math.round(zbozi()*Number(s.hodnota)/100);
  return Math.min(Number(s.hodnota)||0, zbozi()); // pevná částka (přibližně; server přepočítá přesně)
}

async function overitKod(){
  const el=$('#f-slevakod'), zpr=$('#kod-zprava');
  const kod=(el.value||'').trim();
  if(!kod){ STAV.sleva=null; zpr.textContent=''; zpr.className='kod-zprava'; renderSouhrn(); return; }
  zpr.textContent='Ověřuji…'; zpr.className='kod-zprava';
  try{
    const r=await fetch(`/api/objednavka?overit_kod=${encodeURIComponent(kod)}&mezisoucet=${zbozi()}&mena=${MENA==='eur'?'EUR':'CZK'}`);
    const j=await r.json();
    if(j && j.platny){
      STAV.sleva={kod:j.kod||kod.toUpperCase(), typ:j.typ, hodnota:j.hodnota};
      zpr.textContent='Kód uplatněn ✓'; zpr.className='kod-zprava ok';
    }else{
      STAV.sleva=null;
      zpr.textContent=(j&&j.duvod)||'Kód neplatí.'; zpr.className='kod-zprava err';
    }
  }catch(e){ STAV.sleva=null; zpr.textContent='Ověření se nezdařilo.'; zpr.className='kod-zprava err'; }
  renderSouhrn();
}

function dopravaCena(){
  if(vseDigital() || !STAV.doprava || STAV.doprava==='mezi_nami' || !SHIP) return 0;
  let c = STAV.doprava==='vydejni_misto' ? SHIP['box_'+MENA] : SHIP['adresa_'+MENA];
  const prah = SHIP['zdarma_od_'+MENA]||0;
  if(prah>0 && zbozi()>=prah) c=0;
  return c||0;
}

async function init(){
  // prázdný košík
  if(!polozky().length){
    $('#obsah').innerHTML=`<div class="hotovo"><div class="znak">✦</div>
      <h2>Košík je prázdný</h2>
      <p style="color:var(--tlumeny);font-style:italic">Vyberte si nějaký poklad v obchodě.</p>
      <a class="tlac" style="max-width:260px;margin:18px auto" href="/bali-shop">Do obchodu</a></div>`;
    return;
  }
  try{ const r=await fetch('/api/objednavka'); SHIP=(await r.json()).doprava; }catch(e){ SHIP=null; }
  renderFormular();
}

function renderFormular(){
  const dig=vseDigital();
  $('#obsah').innerHTML=`
  <div class="grid">
    <div>
      <div class="karta">
        <h2>Kontaktní údaje</h2>
        <div class="pole"><label>Jméno a příjmení</label><input id="f-jmeno" autocomplete="name"></div>
        <div class="dvoji">
          <div class="pole"><label>E-mail</label><input id="f-email" type="email" autocomplete="email"></div>
          <div class="pole"><label>Telefon</label><input id="f-telefon" autocomplete="tel"></div>
        </div>
      </div>

      ${dig ? `<div class="karta" style="margin-top:18px">
        <h2>Doručení</h2>
        <p class="pozn-doprava">Objednávka obsahuje pouze digitální produkty — doručíme e-mailem po zaplacení, dopravu neřešíme.</p>
      </div>` : `
      <div class="karta" style="margin-top:18px">
        <h2>Doprava</h2>
        <div class="pole"><label>Země doručení</label>
          <div class="volby" id="zeme-volby">
            <div class="volba akt" data-zeme="CZ"><div class="nadpis">Česko</div></div>
            <div class="volba" data-zeme="SK"><div class="nadpis">Slovensko</div></div>
          </div>
        </div>
        <div class="pole"><label>Způsob dopravy (Zásilkovna)</label>
          <div class="volby" id="dop-volby" style="flex-direction:column">
            <div class="volba" data-dop="mezi_nami"><div class="nadpis">Mezi námi — pošlete nám podací kód</div><div class="pod">Zásilku si vytvoříš ve své aplikaci Zásilkovna a pošleš nám kód · dopravu neúčtujeme</div></div>
            <div class="volba" data-dop="vydejni_misto"><div class="nadpis">Klasická Zásilkovna — výdejní místo</div><div class="pod" id="cena-box"></div></div>
            <div class="volba" data-dop="adresa"><div class="nadpis">Klasická Zásilkovna — na adresu</div><div class="pod" id="cena-adresa"></div></div>
          </div>
          <div id="mezinami-pole" style="display:none">
            <div class="pole" style="margin-top:12px"><label>Podací kód (nepovinné)</label>
              <input id="f-kod" placeholder="6místný kód, pokud už ho máš">
              <div class="pozn-doprava">Zásilku vytvoříš v aplikaci Zásilkovna („Mezi námi"), dopravu zaplatíš tam a získáš podací kód. Můžeš ho vyplnit teď, nebo nám ho pošli e-mailem po objednávce — kód napíšeme na balík.</div>
            </div>
          </div>
          <div id="vydejni-pole" style="display:none">
            <div class="pole" style="margin-top:12px"><label>Výdejní místo Zásilkovny</label>
              <button type="button" id="packeta-btn" class="btn-vybrat">📍 Vybrat výdejní místo / Z-BOX</button>
              <div id="packeta-vybrano" class="packeta-vybrano" style="display:none"></div>
              <div class="pole" style="margin-top:12px"><label style="font-size:.82rem;text-transform:none;letter-spacing:0">…nebo napiš pobočku ručně (kdyby se mapa nenačetla)</label>
                <input id="f-vydejni" placeholder="Název nebo adresa pobočky / Z-BOXu">
              </div>
              <div class="pozn-doprava">Tlačítko otevře mapu Zásilkovny s vyhledáváním podle obce či PSČ. Pokud se mapa nenačte (třeba kvůli blokování reklam), vyber si pobočku na <a href="https://www.zasilkovna.cz/pobocky" target="_blank" rel="noopener">zasilkovna.cz/pobocky</a> a napiš ji do pole výše.</div>
            </div>
          </div>
        </div>
        <div id="adresa-pole" style="display:none">
          <div class="pole"><label>Ulice a číslo</label><input id="f-ulice" autocomplete="street-address"></div>
          <div class="dvoji">
            <div class="pole"><label>Město</label><input id="f-mesto"></div>
            <div class="pole"><label>PSČ</label><input id="f-psc" autocomplete="postal-code"></div>
          </div>
        </div>
      </div>`}

      <div class="karta" style="margin-top:18px">
        <h2>Platba</h2>
        <div class="platba-info">QR platba / bankovní převod — po objednávce zobrazíme QR kód a údaje. <br><span style="color:var(--tlumeny);font-style:italic">Platba kartou a Google/Apple Pay — připravujeme.</span></div>
        <div class="pole" style="margin-top:14px"><label>Poznámka (nepovinné)</label><textarea id="f-poznamka" rows="2"></textarea></div>
      </div>
    </div>

    <div class="karta" id="souhrn-karta">
      <h2>Souhrn <span class="mena-prep" id="mena-prep"><button data-m="czk">Kč</button><button data-m="eur">€</button></span></h2>
      <div id="souhrn-polozky"></div>
      <div id="souhrn-doprava"></div>
      <div id="souhrn-sleva"></div>
      <div class="kod-pole">
        <label>Slevový kód</label>
        <div class="kod-radek">
          <input id="f-slevakod" placeholder="Zadej kód" autocomplete="off" spellcheck="false">
          <button type="button" id="kod-pouzit">Použít</button>
        </div>
        <div class="kod-zprava" id="kod-zprava"></div>
      </div>
      <div class="celkem"><span>Celkem</span><b id="souhrn-celkem"></b></div>
      <button class="tlac" id="odeslat">Objednat</button>
      <div class="chyba" id="chyba" style="display:none"></div>
      <div class="souhlas">Odesláním objednávky souhlasíš s <a href="/obchodni-podminky" target="_blank">obchodními podmínkami</a> a se <a href="/gdpr" target="_blank">zpracováním údajů</a> za účelem vyřízení objednávky. U digitálních produktů souhlasíš s dodáním obsahu před uplynutím lhůty pro odstoupení.</div>
    </div>
  </div>`;

  // měna
  syncMena();
  document.querySelectorAll('#mena-prep button').forEach(b=>b.onclick=()=>{ MENA=b.dataset.m; localStorage.setItem('oaza_mena',MENA); syncMena(); renderSouhrn(); });

  // země
  const zv=$('#zeme-volby');
  if(zv) zv.querySelectorAll('.volba').forEach(v=>v.onclick=()=>{ zv.querySelectorAll('.volba').forEach(x=>x.classList.remove('akt')); v.classList.add('akt'); STAV.zeme=v.dataset.zeme; });
  // doprava
  const dv=$('#dop-volby');
  if(dv) dv.querySelectorAll('.volba').forEach(v=>v.onclick=()=>{
    dv.querySelectorAll('.volba').forEach(x=>x.classList.remove('akt')); v.classList.add('akt');
    STAV.doprava=v.dataset.dop;
    $('#mezinami-pole').style.display = STAV.doprava==='mezi_nami' ? 'block':'none';
    $('#adresa-pole').style.display   = STAV.doprava==='adresa' ? 'block':'none';
    $('#vydejni-pole').style.display  = STAV.doprava==='vydejni_misto' ? 'block':'none';
    renderSouhrn();
  });

  $('#odeslat').onclick=odeslat;

  // Zásilkovna widget: výběr pobočky + ruční fallback
  const pb=$('#packeta-btn'); if(pb) pb.onclick=otevritPacketu;
  const vf=$('#f-vydejni'); if(vf) vf.addEventListener('input',()=>{ // ruční úprava ruší vybranou pobočku z widgetu (aby ID nesedělo k jinému textu)
    if(STAV.packetaPoint){ STAV.packetaPoint=null; const d=$('#packeta-vybrano'); if(d) d.style.display='none'; }
  });

  // slevový kód
  const kb=$('#kod-pouzit'); if(kb) kb.onclick=overitKod;
  const ki=$('#f-slevakod'); if(ki) ki.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); overitKod(); } });

  renderSouhrn();
}

function syncMena(){ document.querySelectorAll('#mena-prep button').forEach(b=>b.classList.toggle('akt',b.dataset.m===MENA)); }

function otevritPacketu(){
  $('#chyba').style.display='none';
  if(!(window.Packeta && Packeta.Widget && typeof Packeta.Widget.pick==='function')){
    // widget se nenačetl (nejčastěji kvůli blokování reklam) → nasměruj na ruční pole
    const vf=$('#f-vydejni'); if(vf) vf.focus();
    return chyba('Mapu Zásilkovny se nepodařilo načíst (možná ji blokuje rozšíření prohlížeče). Napiš prosím pobočku ručně do pole níže.');
  }
  const opts={ language:'cs', country:(STAV.zeme||'CZ').toLowerCase() };
  Packeta.Widget.pick(PACKETA_API_KEY, function(point){
    if(!point) return; // zavřeno bez výběru
    STAV.packetaPoint=point;
    const nazev=point.name||'';
    const psc=point.zip?String(point.zip).replace(/\s+/g,' ').trim():'';
    const adr=[point.street, psc, point.city].filter(Boolean).join(', ');
    const text=point.formatedValue || [nazev,adr].filter(Boolean).join(' · ') || nazev;
    const vf=$('#f-vydejni'); if(vf) vf.value=text; // programové nastavení nespustí 'input', takže vybraný bod zůstane
    const d=$('#packeta-vybrano');
    if(d){ d.style.display='block'; d.innerHTML='✓ Vybráno: <b>'+esc(nazev||text)+'</b>'+(adr?('<br>'+esc(adr)):''); }
  }, opts);
}

function renderSouhrn(){
  $('#souhrn-polozky').innerHTML = polozky().map(p=>`<div class="souhrn-pol"><span class="n">${esc(p.nazev)}${p.digitalni?' · digitální':''}</span><span class="c">${fmt(cenaPol(p))}</span></div>`).join('');
  const dig=vseDigital();
  const dc=dopravaCena();
  let dopravaHtml = `<div class="radek"><span>Mezisoučet</span><span>${fmt(zbozi())}</span></div>`;
  if(!dig){
    let text;
    if(!STAV.doprava) text='<span style="font-style:italic">zvol dopravu</span>';
    else if(STAV.doprava==='mezi_nami') text='platíš v aplikaci';
    else text = (dc===0?'zdarma':fmt(dc));
    dopravaHtml += `<div class="radek"><span>Doprava</span><span>${text}</span></div>`;
  }
  $('#souhrn-doprava').innerHTML=dopravaHtml;
  const sc=slevaCastka();
  $('#souhrn-sleva').innerHTML = sc>0
    ? `<div class="radek sleva"><span>Sleva${STAV.sleva&&STAV.sleva.kod?` · ${esc(STAV.sleva.kod)}`:''}</span><span>−${fmt(sc)}</span></div>`
    : '';
  $('#souhrn-celkem').textContent = fmt(Math.max(0, zbozi()+dc-sc));
  // ceny u voleb dopravy
  if(SHIP && !dig){
    const cb=$('#cena-box'), ca=$('#cena-adresa');
    if(cb) cb.textContent = fmt(SHIP['box_'+MENA]||0);
    if(ca) ca.textContent = fmt(SHIP['adresa_'+MENA]||0);
  }
}

function chyba(t){ const e=$('#chyba'); e.style.display='block'; e.textContent=t; }

async function odeslat(){
  $('#chyba').style.display='none';
  const jmeno=$('#f-jmeno').value.trim();
  const email=$('#f-email').value.trim();
  const telefon=$('#f-telefon').value.trim();
  if(!jmeno) return chyba('Vyplň jméno.');
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) return chyba('Vyplň platný e-mail.');

  const dig=vseDigital();
  let adresa=null, vydejni=null, podaciKod=null;
  if(!dig){
    if(!STAV.doprava) return chyba('Zvol způsob dopravy.');
    if(STAV.doprava==='adresa'){
      const ulice=$('#f-ulice').value.trim(), mesto=$('#f-mesto').value.trim(), psc=$('#f-psc').value.trim();
      if(!ulice||!mesto||!psc) return chyba('Vyplň ulici, město a PSČ.');
      adresa={ulice,mesto,psc};
    } else if(STAV.doprava==='vydejni_misto'){
      vydejni=$('#f-vydejni').value.trim();
      if(!vydejni) return chyba('Napiš výdejní místo Zásilkovny.');
    } else if(STAV.doprava==='mezi_nami'){
      podaciKod=$('#f-kod').value.trim(); // nepovinné
    }
  }

  const btn=$('#odeslat'); btn.disabled=true; btn.textContent='Odesílám…';
  try{
    const r=await fetch('/api/objednavka',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        jmeno,email,telefon, zeme:STAV.zeme,
        doprava: dig?null:STAV.doprava, adresa,
        vydejni_misto: vydejni, podaci_kod: podaciKod,
        packeta_id: (STAV.doprava==='vydejni_misto' && STAV.packetaPoint) ? STAV.packetaPoint.id : null,
        packeta_psc: (STAV.doprava==='vydejni_misto' && STAV.packetaPoint && STAV.packetaPoint.zip) ? String(STAV.packetaPoint.zip).replace(/\s+/g,' ').trim() : null,
        polozky: polozky().map(p=>({slug:p.slug})),
        mena: MENA==='eur'?'EUR':'CZK',
        poznamka: $('#f-poznamka').value.trim(),
        sleva_kod: STAV.sleva ? STAV.sleva.kod : null,
      })});
    const j=await r.json();
    if(!r.ok){
      if(j.nedostupne){ (j.nedostupne||[]).forEach(s=>Kosik.odeber(s)); chyba('Některé položky už nejsou skladem a byly odebrány. Zkontroluj košík.'); setTimeout(init,1400); }
      else chyba(j.error||'Objednávku se nepodařilo vytvořit.');
      btn.disabled=false; btn.textContent='Objednat'; return;
    }
    Kosik.vyprazdni();
    potvrzeni(j);
  }catch(e){ chyba('Chyba spojení. Zkus to prosím znovu.'); btn.disabled=false; btn.textContent='Objednat'; }
}

function potvrzeni(j){
  const ucet = j.ucet.cislo
    ? `<div><span class="k">Účet</span><span class="v">${esc(j.ucet.cislo)}</span></div>`
    : `<div><span class="k">Banka</span><span class="v">${esc(j.ucet.popis)}</span></div>`;
  $('#obsah').innerHTML=`
  <div class="hotovo">
    <div class="znak">✦</div>
    <h2>Objednávka přijata</h2>
    <p style="color:var(--tlumeny);font-style:italic">Číslo objednávky #${esc(j.cislo)}. Zaplať prosím QR kódem nebo převodem níže.</p>
    <div class="qr-box"><img src="${esc(j.qr_url)}" alt="QR platba" width="220" height="220" style="display:block" onerror="this.parentNode.style.display='none'"></div>
    <div class="platdetail">
      ${ucet}
      <div><span class="k">IBAN</span><span class="v">${esc(j.iban)}</span></div>
      ${j.sleva_castka>0?`<div><span class="k">Sleva${j.sleva_kod?` · ${esc(j.sleva_kod)}`:''}</span><span class="v">−${(j.sleva_castka).toLocaleString('cs-CZ')} ${j.mena==='EUR'?'€':'Kč'}</span></div>`:''}
      <div><span class="k">Částka</span><span class="v">${(j.cena_celkem).toLocaleString('cs-CZ')} ${j.mena==='EUR'?'€':'Kč'}</span></div>
      <div><span class="k">Variabilní symbol</span><span class="v">${esc(j.vs)}</span></div>
      <div><span class="k">Zpráva</span><span class="v">OAZA OBCHOD ${esc(j.cislo)}</span></div>
    </div>
    <p style="color:var(--tlumeny);font-style:italic;max-width:440px;margin:14px auto">
      ${j.vseDigital
        ? 'Po přijetí platby ti zašleme digitální obsah e-mailem.'
        : (j.doprava==='mezi_nami'
            ? 'Vytvoř si prosím zásilku ve své aplikaci Zásilkovna a pošli nám <b>podací kód</b> na oaza.adamanthea@gmail.com (pokud jsi ho nevyplnil). Po přijetí platby a kódu balík předáme.'
            : 'Po přijetí platby ti potvrdíme objednávku a odešleme zboží.')}
      ${j.email_sent ? '<br>Potvrzení jsme poslali i na tvůj e-mail.' : ''}
      </p>
    <a class="tlac" style="max-width:260px;margin:6px auto" href="/bali-shop">Zpět do obchodu</a>
  </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

if(window.Kosik) init(); else window.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
