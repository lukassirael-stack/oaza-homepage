<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Přehled návštěvnosti — Oáza Adamanthea</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e1712; --panel:#16221b; --panel2:#1c2b22;
    --line:rgba(201,162,75,.22); --line-soft:rgba(241,234,217,.08);
    --ink:#f1ead9; --muted:#93a594; --muted2:#6f8174;
    --gold:#c9a24b; --gold-soft:#d8be84; --rose:#c58a8a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:radial-gradient(120% 80% at 50% -10%, #16241b 0%, var(--bg) 55%) fixed;
    color:var(--ink); font-family:"Jost",system-ui,sans-serif;
    min-height:100vh; line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1040px;margin:0 auto;padding:clamp(20px,4vw,52px) clamp(16px,4vw,40px) 80px}

  /* ---- přihlášení ---- */
  .gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .gate-card{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:40px 34px;max-width:380px;width:100%;text-align:center;
    box-shadow:0 24px 60px rgba(0,0,0,.45);
  }
  .gate-mark{font-family:"Cinzel";color:var(--gold);letter-spacing:.18em;font-size:.74rem;margin-bottom:18px}
  .gate-card h1{font-family:"Cinzel";font-weight:500;font-size:1.3rem;margin-bottom:6px}
  .gate-card p{color:var(--muted);font-size:.92rem;margin-bottom:24px}
  input[type=password]{
    width:100%;background:#0f1a14;border:1px solid var(--line);border-radius:9px;
    color:var(--ink);font-family:"Jost";font-size:1rem;padding:12px 14px;margin-bottom:14px;text-align:center;
  }
  input[type=password]:focus{outline:none;border-color:var(--gold)}
  button{
    cursor:pointer;font-family:"Jost";font-weight:400;letter-spacing:.04em;
    border:1px solid var(--gold);background:linear-gradient(180deg,var(--gold-soft),var(--gold));
    color:#1a1108;border-radius:9px;padding:11px 22px;font-size:.95rem;transition:filter .15s;
  }
  button:hover{filter:brightness(1.08)}
  button.ghost{background:transparent;color:var(--gold-soft);border-color:var(--line)}
  button.ghost:hover{filter:none;border-color:var(--gold)}
  .chyba{color:var(--rose);font-size:.86rem;min-height:1.2em;margin-top:4px}

  /* ---- hlavička ---- */
  header.top{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:16px;
    padding-bottom:22px;border-bottom:1px solid var(--line);margin-bottom:30px}
  .eyebrow{font-family:"Cinzel";color:var(--gold);letter-spacing:.22em;font-size:.66rem;margin-bottom:8px}
  header.top h1{font-family:"Cinzel";font-weight:500;font-size:clamp(1.5rem,3.5vw,2.05rem);line-height:1.1}
  .controls{display:flex;gap:8px;align-items:center}
  .tabs{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .tabs button{border:none;border-radius:0;background:transparent;color:var(--muted);
    padding:8px 16px;font-size:.85rem;letter-spacing:.02em}
  .tabs button.active{background:rgba(201,162,75,.14);color:var(--gold-soft)}

  /* ---- karty se souhrnem ---- */
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:34px}
  .card{background:var(--panel);border:1px solid var(--line-soft);border-radius:13px;padding:20px 22px;position:relative;overflow:hidden}
  .card::after{content:"";position:absolute;left:0;top:0;width:100%;height:2px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5}
  .card .label{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted2)}
  .card .num{font-family:"Cormorant Garamond";font-weight:600;font-size:2.6rem;line-height:1.05;color:var(--ink);margin-top:6px}
  .card .sub{font-size:.78rem;color:var(--muted);margin-top:2px}

  /* ---- panely ---- */
  .panel{background:var(--panel);border:1px solid var(--line-soft);border-radius:14px;padding:24px 26px;margin-bottom:22px}
  .panel h2{font-family:"Cinzel";font-weight:500;font-size:1.02rem;letter-spacing:.04em;margin-bottom:20px;color:var(--gold-soft)}

  /* ---- denní graf ---- */
  .chart{display:flex;align-items:flex-end;gap:3px;height:170px}
  .bar{flex:1;min-width:0;background:linear-gradient(180deg,var(--gold-soft),rgba(201,162,75,.25));
    border-radius:3px 3px 0 0;min-height:2px;position:relative;transition:filter .12s}
  .bar:hover{filter:brightness(1.25)}
  .bar.zero{background:var(--line-soft)}
  .axis{display:flex;justify-content:space-between;margin-top:10px;color:var(--muted2);font-size:.72rem}

  /* ---- tabulka stránek ---- */
  table{width:100%;border-collapse:collapse;font-size:.92rem}
  th,td{text-align:left;padding:11px 10px;border-bottom:1px solid var(--line-soft)}
  th{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);font-weight:400}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  td .path{color:var(--ink)}
  td .title{color:var(--muted);font-size:.78rem;display:block;margin-top:1px}
  tbody tr:hover{background:rgba(201,162,75,.05)}

  /* ---- dva sloupce ---- */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  .srcrow{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--line-soft)}
  .srcrow:last-child{border-bottom:none}
  .srcrow .name{flex:1;color:var(--ink)}
  .srcbar{height:6px;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--rose));min-width:6px}
  .srcrow .cnt{color:var(--muted);font-variant-numeric:tabular-nums;min-width:38px;text-align:right}
  .device{display:flex;gap:18px;align-items:center;justify-content:center;padding:14px 0}
  .device .d{text-align:center}
  .device .d .v{font-family:"Cormorant Garamond";font-weight:600;font-size:2rem;color:var(--ink)}
  .device .d .l{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2)}
  .donut{width:120px;height:120px}

  .empty{color:var(--muted);text-align:center;padding:30px 0;font-family:"Cormorant Garamond";font-size:1.15rem}
  .foot{margin-top:30px;color:var(--muted2);font-size:.76rem;text-align:center}
  @media(max-width:760px){
    .cards{grid-template-columns:repeat(2,1fr)}
    .grid2{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<!-- PŘIHLÁŠENÍ -->
<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gate-mark">✦ OÁZA ADAMANTHEA ✦</div>
    <h1>Přehled návštěvnosti</h1>
    <p>Zadej heslo pro zobrazení statistik.</p>
    <input type="password" id="heslo" placeholder="Heslo" autocomplete="current-password">
    <button id="vstoupit">Zobrazit přehled</button>
    <div class="chyba" id="gateChyba"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="wrap" id="dash" style="display:none">
  <header class="top">
    <div>
      <div class="eyebrow">✦ NÁVŠTĚVNOST WEBU ✦</div>
      <h1>Přehled návštěvnosti</h1>
    </div>
    <div class="controls">
      <div class="tabs" id="tabs">
        <button data-dny="dnes">Dnes</button>
        <button data-dny="7">7 dní</button>
        <button data-dny="30" class="active">30 dní</button>
        <button data-dny="90">90 dní</button>
      </div>
      <button class="ghost" id="refresh">Obnovit</button>
    </div>
  </header>

  <div id="obsah"><div class="empty">Načítám…</div></div>

  <div class="foot">Cookieless měření · aktivní doba na stránce · data uložená ve vlastním Supabase</div>
</div>

<script>
const ENDPOINT = "/api/analytika";
let heslo = "";
let dny = 30;

function fmtDoba(s){
  s = Math.round(s||0);
  if(s < 60) return s + " s";
  const m = Math.floor(s/60), r = s%60;
  if(m < 60) return m + " min " + (r?r+" s":"");
  const h = Math.floor(m/60);
  return h + " h " + (m%60) + " min";
}
function esc(t){const d=document.createElement("div");d.textContent=t==null?"":t;return d.innerHTML;}

document.getElementById("vstoupit").onclick = vstoupit;
document.getElementById("heslo").addEventListener("keydown", e=>{ if(e.key==="Enter") vstoupit(); });
document.getElementById("refresh").onclick = nacti;
document.querySelectorAll("#tabs button").forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll("#tabs button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    dny = b.dataset.dny;
    nacti();
  };
});

async function vstoupit(){
  heslo = document.getElementById("heslo").value.trim();
  const ch = document.getElementById("gateChyba");
  ch.textContent = "";
  if(!heslo){ ch.textContent = "Zadej heslo."; return; }
  const ok = await nacti(true);
  if(ok){
    document.getElementById("gate").style.display = "none";
    document.getElementById("dash").style.display = "block";
  } else {
    ch.textContent = "Špatné heslo nebo chyba spojení.";
  }
}

async function nacti(tichy){
  const obsah = document.getElementById("obsah");
  if(!tichy) obsah.innerHTML = '<div class="empty">Načítám…</div>';
  try{
    const r = await fetch(`${ENDPOINT}?heslo=${encodeURIComponent(heslo)}&dny=${dny}`);
    if(!r.ok) return false;
    const d = await r.json();
    vykresli(d);
    return true;
  }catch(e){
    if(!tichy) obsah.innerHTML = '<div class="empty">Chyba spojení.</div>';
    return false;
  }
}

function vykresli(d){
  const obsah = document.getElementById("obsah");
  const maxDen = Math.max(1, ...d.podleDne.map(x=>x.navstev));
  const bary = d.podleDne.map(x=>{
    const h = x.navstev ? Math.max(2, (x.navstev/maxDen)*100) : 0;
    const cls = x.navstev ? "bar" : "bar zero";
    return `<div class="${cls}" style="height:${h||2}%" title="${x.den}: ${x.navstev} návštěv"></div>`;
  }).join("");
  const prvni = d.podleDne[0]?.den || "";
  const posl = d.podleDne[d.podleDne.length-1]?.den || "";

  const radky = d.podleStranky.slice(0,25).map(s=>`
    <tr>
      <td><span class="path">${esc(s.stranka)}</span></td>
      <td class="num">${s.navstev}</td>
      <td class="num">${fmtDoba(s.prumDoba)}</td>
      <td class="num">${fmtDoba(s.celkovaDoba)}</td>
    </tr>`).join("");

  const maxRef = Math.max(1, ...d.topReferrery.map(x=>x.pocet));
  const zdroje = d.topReferrery.length ? d.topReferrery.map(x=>`
    <div class="srcrow">
      <span class="name">${esc(x.zdroj)}</span>
      <span class="srcbar" style="width:${(x.pocet/maxRef)*120}px"></span>
      <span class="cnt">${x.pocet}</span>
    </div>`).join("") : '<div class="empty">Zatím žádné zdroje.</div>';

  const celkZar = (d.mobil + d.desktop) || 1;
  const mobilPct = Math.round((d.mobil/celkZar)*100);

  obsah.innerHTML = `
    <div class="cards">
      <div class="card"><div class="label">Návštěvy</div><div class="num">${d.celkemNavstev}</div><div class="sub">${d.obdobiPopis}</div></div>
      <div class="card"><div class="label">Unikátní relace</div><div class="num">${d.unikatnichRelaci}</div><div class="sub">jednotliví návštěvníci</div></div>
      <div class="card"><div class="label">Průměrná doba</div><div class="num">${fmtDoba(d.prumernaDoba)}</div><div class="sub">aktivní čas na stránce</div></div>
      <div class="card"><div class="label">Mobil / Desktop</div><div class="num">${mobilPct}%</div><div class="sub">${d.mobil} mobil · ${d.desktop} desktop</div></div>
    </div>

    <div class="panel">
      <h2>Návštěvy v čase</h2>
      <div class="chart">${bary}</div>
      <div class="axis"><span>${prvni}</span><span>${posl}</span></div>
    </div>

    <div class="grid2">
      <div class="panel">
        <h2>Odkud návštěvníci přišli</h2>
        ${zdroje}
      </div>
      <div class="panel">
        <h2>Zařízení</h2>
        <div class="device">
          <svg class="donut" viewBox="0 0 36 36">
            <circle cx="18" cy="18" r="15.9" fill="none" stroke="rgba(241,234,217,.1)" stroke-width="3.4"/>
            <circle cx="18" cy="18" r="15.9" fill="none" stroke="#c9a24b" stroke-width="3.4"
              stroke-dasharray="${mobilPct} ${100-mobilPct}" stroke-dashoffset="25" stroke-linecap="round"/>
          </svg>
          <div>
            <div class="d"><div class="v">${d.mobil}</div><div class="l">Mobil</div></div>
            <div class="d" style="margin-top:10px"><div class="v">${d.desktop}</div><div class="l">Desktop</div></div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>Stránky podle návštěvnosti</h2>
      ${d.podleStranky.length ? `<table>
        <thead><tr>
          <th>Stránka</th><th class="num">Návštěv</th><th class="num">Prům. doba</th><th class="num">Celková doba</th>
        </tr></thead>
        <tbody>${radky}</tbody>
      </table>` : '<div class="empty">Zatím žádná data. Jakmile někdo navštíví web, objeví se tu.</div>'}
    </div>
  `;
}
</script>
</body>
</html>
