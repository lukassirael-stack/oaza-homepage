<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Objednávky — Oáza Adamanthea</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:wght@0,400;0,500;0,600&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{--slonovina:#F6F1E7;--karta:#FBF8F1;--namornicka:#1B2A41;--namornicka2:#33486A;--zlata:#B8924A;--tlumeny:#7A715F;--cervena:#9C4A3C;--linka:#E2D6BC;--zelena:#4d7c52}
  *{box-sizing:border-box}
  body{background:var(--slonovina);color:var(--namornicka);font-family:'EB Garamond',Georgia,serif;line-height:1.55;margin:0}
  .wrap{max-width:1000px;margin:0 auto;padding:24px 18px 70px}
  h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:2rem;margin:0 0 2px;text-align:center}
  .eyebrow{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.32em;text-transform:uppercase;color:var(--zlata);text-align:center}
  .hidden{display:none}

  /* login */
  #login{max-width:340px;margin:80px auto;text-align:center}
  #login input{width:100%;padding:11px 13px;border:1px solid var(--linka);background:var(--karta);border-radius:9px;font-family:'EB Garamond',serif;font-size:1rem;margin:14px 0}
  .btn{font-family:'Cinzel',serif;font-size:.76rem;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--namornicka);background:var(--namornicka);color:var(--slonovina);padding:10px 16px;border-radius:7px;cursor:pointer}
  .btn:hover{background:var(--namornicka2)}
  .btn.ghost{background:transparent;color:var(--namornicka);border-color:var(--linka)}
  .btn.ghost:hover{border-color:var(--zlata)}
  .btn.mini{padding:6px 11px;font-size:.66rem}
  .btn.zelena{background:var(--zelena);border-color:var(--zelena)}
  .btn.danger{color:var(--cervena);background:transparent;border-color:var(--linka)}
  #loginErr{color:var(--cervena);font-style:italic;font-size:.9rem;min-height:1em}

  .filtry{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:18px 0 16px}
  .fpill{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;padding:7px 13px;border:1px solid var(--linka);border-radius:30px;background:transparent;color:var(--namornicka2);cursor:pointer}
  .fpill.akt{background:var(--namornicka);color:var(--slonovina);border-color:var(--namornicka)}

  .obj{background:var(--karta);border:1px solid var(--linka);border-radius:13px;padding:16px 18px;margin-bottom:14px}
  .obj-hlava{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:space-between}
  .obj-cislo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:500}
  .obj-datum{color:var(--tlumeny);font-size:.85rem}
  .badge{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:20px;white-space:nowrap}
  .b-ceka{background:#f3e6c8;color:#8a6a1f}
  .b-zaplaceno{background:#d9ecdb;color:#2f6135}
  .b-odeslano{background:#dbe4f2;color:#274a7a}
  .b-zruseno{background:#eee;color:#888}
  .obj-telo{display:grid;grid-template-columns:1.3fr 1fr;gap:14px;margin-top:12px}
  @media(max-width:640px){.obj-telo{grid-template-columns:1fr}}
  .blok h4{font-family:'Cinzel',serif;font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;color:var(--tlumeny);margin:0 0 5px}
  .polozka{display:flex;justify-content:space-between;gap:10px;padding:3px 0;border-bottom:1px dashed var(--linka);font-size:.95rem}
  .ceny{margin-top:7px;font-size:.92rem}
  .ceny div{display:flex;justify-content:space-between;padding:2px 0}
  .ceny .celk{font-weight:600;font-size:1.05rem;border-top:1px solid var(--linka);margin-top:4px;padding-top:5px}
  .kontakt div,.doprava div{font-size:.93rem;padding:1px 0}
  .kontakt .k,.doprava .k{color:var(--tlumeny);font-size:.8rem}
  .kod-radek{display:flex;gap:7px;margin-top:7px}
  .kod-radek input{flex:1;min-width:80px;padding:7px 9px;border:1px solid var(--linka);border-radius:7px;background:var(--slonovina);font-family:'EB Garamond',serif}
  .akce{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;padding-top:12px;border-top:1px solid var(--linka)}
  .pozn{margin-top:8px;font-style:italic;color:var(--tlumeny);font-size:.9rem}
  .prazdno{text-align:center;color:var(--tlumeny);font-style:italic;padding:50px 0}
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--namornicka);color:var(--slonovina);padding:11px 20px;border-radius:8px;opacity:0;transition:.3s;pointer-events:none;font-size:.92rem}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .topbar a{color:var(--zlata);text-decoration:none;font-size:.85rem}
</style>
</head>
<body>
<div class="wrap">

  <div id="login">
    <div class="eyebrow">Oáza Adamanthea</div>
    <h1>Objednávky</h1>
    <input id="heslo" type="password" placeholder="heslo" autocomplete="current-password">
    <button class="btn" id="vstup" style="width:100%">Vstoupit</button>
    <div id="loginErr"></div>
  </div>

  <div id="app" class="hidden">
    <div class="topbar">
      <div><div class="eyebrow" style="text-align:left">Oáza Adamanthea</div><h1 style="text-align:left">Objednávky</h1></div>
      <div><a href="/admin-produkty">→ Produkty</a> · <a href="#" id="obnovit">Obnovit</a></div>
    </div>

    <div class="filtry" id="filtry">
      <button class="fpill akt" data-f="vse">Vše</button>
      <button class="fpill" data-f="ceka_platba">Čeká na platbu</button>
      <button class="fpill" data-f="zaplaceno">Zaplaceno</button>
      <button class="fpill" data-f="odeslano">Odesláno</button>
      <button class="fpill" data-f="zruseno">Zrušeno</button>
    </div>

    <div id="seznam"><div class="prazdno">Načítám…</div></div>
  </div>

</div>
<div id="toast"></div>

<script>
let HESLO='', OBJ=[], FILTR='vse';
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(t){const e=$('#toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2600);}

async function api(action, extra={}){
  const r=await fetch('/api/eshop-admin',{method:'POST',headers:{'Content-Type':'application/json','x-heslo':HESLO},
    body:JSON.stringify({action,...extra})});
  if(r.status===401){odhlas();throw new Error('Neplatné heslo');}
  const j=await r.json();
  if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
  return j;
}

function vstup(){
  const h=$('#heslo').value.trim();
  if(!h){$('#loginErr').textContent='Zadej heslo.';return;}
  HESLO=h;
  api('objednavky-list').then(j=>{
    OBJ=j.objednavky||[];
    $('#login').classList.add('hidden');$('#app').classList.remove('hidden');
    render();
  }).catch(e=>{$('#loginErr').textContent=e.message;});
}
function odhlas(){HESLO='';$('#app').classList.add('hidden');$('#login').classList.remove('hidden');}
$('#vstup').onclick=vstup;
$('#heslo').addEventListener('keydown',e=>{if(e.key==='Enter')vstup();});
$('#obnovit').onclick=e=>{e.preventDefault();nacti();};

async function nacti(){ try{ const j=await api('objednavky-list'); OBJ=j.objednavky||[]; render(); }catch(e){ toast('Chyba: '+e.message); } }

document.querySelectorAll('.fpill').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.fpill').forEach(x=>x.classList.remove('akt')); b.classList.add('akt');
  FILTR=b.dataset.f; render();
});

const symbol=m=> m==='EUR'?'€':'Kč';
const cena=(v,m)=> `${Number(v||0).toLocaleString('cs-CZ')} ${symbol(m)}`;
const STAVY={ceka_platba:['Čeká na platbu','b-ceka'], nova:['Nová','b-ceka'], zaplaceno:['Zaplaceno','b-zaplaceno'], odeslano:['Odesláno','b-odeslano'], zruseno:['Zrušeno','b-zruseno']};

function dopravaText(o){
  const pp=o.packeta_point||{};
  if(o.doprava==='digital') return {nazev:'Digitální (e-mailem)', detail:''};
  if(o.doprava==='mezi_nami') return {nazev:'Zásilkovna — Mezi námi', detail: pp.kod?('podací kód: '+esc(pp.kod)):'<i>kód zatím nedodán</i>'};
  if(o.doprava==='vydejni_misto') return {nazev:'Zásilkovna — výdejní místo', detail: esc(pp.text||'')};
  if(o.doprava==='adresa'){const a=o.adresa||{};return {nazev:'Na adresu', detail: esc(`${a.ulice||''}, ${a.psc||''} ${a.mesto||''}`)};}
  return {nazev:o.doprava||'—', detail:''};
}

function render(){
  let list=OBJ.slice();
  if(FILTR!=='vse') list=list.filter(o=> FILTR==='ceka_platba' ? (o.stav==='ceka_platba'||o.stav==='nova') : o.stav===FILTR);
  if(!list.length){$('#seznam').innerHTML='<div class="prazdno">Žádné objednávky.</div>';return;}

  $('#seznam').innerHTML=list.map(o=>{
    const [stavTxt,stavCls]=STAVY[o.stav]||[o.stav,'b-ceka'];
    const d=dopravaText(o);
    const polozky=(o.polozky||[]).map(p=>`<div class="polozka"><span>${esc(p.nazev)}${p.digitalni?' · dig.':''}</span><span>${cena(o.mena==='EUR'?p.cena_eur:p.cena,o.mena)}</span></div>`).join('');
    const datum=o.vytvoreno?new Date(o.vytvoreno).toLocaleString('cs-CZ',{day:'numeric',month:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}):'';

    // akce dle stavu
    let akce='';
    if(o.stav==='ceka_platba'||o.stav==='nova'){
      akce += `<button class="btn zelena mini" onclick="stav('${o.id}','zaplaceno')">✓ Zaplaceno</button>`;
      akce += `<button class="btn danger mini" onclick="stav('${o.id}','zruseno')">Zrušit</button>`;
    } else if(o.stav==='zaplaceno'){
      akce += `<button class="btn mini" onclick="stav('${o.id}','odeslano')">📦 Odesláno</button>`;
      akce += `<button class="btn danger mini" onclick="stav('${o.id}','zruseno')">Zrušit</button>`;
    } else if(o.stav==='odeslano'){
      akce += `<span style="color:var(--tlumeny);font-style:italic;font-size:.9rem">Vyřízeno ✓</span>`;
    } else if(o.stav==='zruseno'){
      akce += `<button class="btn ghost mini" onclick="stav('${o.id}','ceka_platba')">Obnovit</button>`;
    }

    // pole na podací kód u Mezi námi
    let kodPole='';
    if(o.doprava==='mezi_nami'){
      const cur=(o.packeta_point&&o.packeta_point.kod)||'';
      kodPole=`<div class="kod-radek">
        <input id="kod-${o.id}" placeholder="podací kód" value="${esc(cur)}">
        <button class="btn ghost mini" onclick="ulozKod('${o.id}')">Uložit kód</button></div>`;
    }

    return `<div class="obj">
      <div class="obj-hlava">
        <span class="obj-cislo">#${o.cislo}</span>
        <span class="obj-datum">${datum}</span>
        <span class="badge ${stavCls}">${stavTxt}</span>
      </div>
      <div class="obj-telo">
        <div class="blok">
          <h4>Položky</h4>${polozky}
          <div class="ceny">
            <div><span>Zboží</span><span>${cena(o.cena_zbozi,o.mena)}</span></div>
            <div><span>Doprava</span><span>${o.doprava_cena?cena(o.doprava_cena,o.mena):(o.doprava==='mezi_nami'?'platí zákazník':'0')}</span></div>
            <div class="celk"><span>Celkem</span><span>${cena(o.cena_celkem,o.mena)}</span></div>
          </div>
          ${o.poznamka?`<div class="pozn">„${esc(o.poznamka)}"</div>`:''}
        </div>
        <div class="blok">
          <h4>Zákazník</h4>
          <div class="kontakt">
            <div>${esc(o.jmeno||'')}</div>
            <div><a href="mailto:${esc(o.email||'')}">${esc(o.email||'')}</a></div>
            ${o.telefon?`<div>${esc(o.telefon)}</div>`:''}
            <div class="k" style="margin-top:6px">Země: ${esc(o.zeme||'')}</div>
          </div>
          <h4 style="margin-top:12px">Doprava</h4>
          <div class="doprava"><div>${d.nazev}</div>${d.detail?`<div class="k">${d.detail}</div>`:''}</div>
          ${kodPole}
          <h4 style="margin-top:12px">Platba</h4>
          <div class="doprava"><div class="k">VS: <b>${esc(o.vs||'')}</b> · ${esc((o.zpusob_platby||'').toUpperCase())}</div></div>
        </div>
      </div>
      <div class="akce">${akce}</div>
    </div>`;
  }).join('');
}

window.stav=async(id,novy)=>{
  if(novy==='zaplaceno' && !confirm('Označit jako ZAPLACENO? Produkty z objednávky se označí jako prodáno a zmizí z obchodu.'))return;
  if(novy==='zruseno' && !confirm('Opravdu zrušit objednávku? Prodané produkty se vrátí na sklad.'))return;
  try{ await api('objednavka-stav',{id,stav:novy}); toast('Uloženo.'); await nacti(); }
  catch(e){ toast('Chyba: '+e.message); }
};
window.ulozKod=async(id)=>{
  const kod=$('#kod-'+id).value.trim();
  try{ await api('objednavka-kod',{id,kod}); toast('Kód uložen.'); await nacti(); }
  catch(e){ toast('Chyba: '+e.message); }
};
</script>
</body>
</html>
