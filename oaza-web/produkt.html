<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produkt — Oáza Adamanthea</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{--slonovina:#F6F1E7;--slonovina2:#EFE8D8;--karta:#FBF8F1;--namornicka:#1B2A41;--namornicka2:#33486A;
    --zlata:#B8924A;--zlata2:#D9BC7E;--tlumeny:#7A715F;--cervena:#9C4A3C;--linka:#E2D6BC}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--slonovina);color:var(--namornicka);font-family:'EB Garamond',Georgia,serif;line-height:1.65;
    background-image:radial-gradient(circle at 50% -5%,rgba(184,146,74,.10),transparent 60%)}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1080px;margin:0 auto;padding:0 22px}
  .zpet{display:inline-flex;align-items:center;gap:7px;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.18em;
    text-transform:uppercase;color:var(--tlumeny);padding:26px 0 6px}
  .zpet:hover{color:var(--zlata)}

  .detail{display:grid;grid-template-columns:1.05fr .95fr;gap:46px;padding:8px 0 50px}
  @media(max-width:780px){.detail{grid-template-columns:1fr;gap:28px}}

  .galerie .hlavni{aspect-ratio:4/5;background:var(--slonovina2);border:1px solid var(--linka);overflow:hidden;border-radius:16px}
  .galerie .hlavni img{width:100%;height:100%;object-fit:cover;display:block}
  .galerie video{width:100%;border:1px solid var(--linka);margin-top:12px;background:#000}
  .mini{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  .mini img{width:66px;height:82px;object-fit:cover;border:1px solid var(--linka);cursor:pointer;opacity:.62;transition:.18s;border-radius:10px}
  .mini img.akt,.mini img:hover{opacity:1;border-color:var(--zlata)}

  .info .eyebrow{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;color:var(--zlata)}
  .info h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(2rem,4.5vw,2.9rem);line-height:1.08;margin:.18em 0 .12em}
  .cena{font-size:1.5rem;color:var(--namornicka2);font-family:'Cormorant Garamond',serif;margin:.1em 0 .2em}
  .mena-prep{display:inline-flex;border:1px solid var(--linka);border-radius:30px;overflow:hidden}
  .mena-prep button{border:none;background:transparent;padding:6px 12px;cursor:pointer;font-family:'Cinzel',serif;font-size:.74rem;color:var(--namornicka2)}
  .mena-prep button.akt{background:var(--namornicka);color:var(--slonovina)}
  .delic{height:1px;background:linear-gradient(90deg,var(--zlata),transparent);margin:18px 0}
  .stitky{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 2px}
  .tag{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;padding:4px 10px;
    border:1px solid var(--linka);border-radius:30px;color:var(--namornicka2)}
  .popis{white-space:pre-line;color:#2a3343;font-size:1.06rem;margin:6px 0 4px}
  .vlastnosti{margin:14px 0;font-size:.98rem;color:var(--tlumeny)}
  .vlastnosti b{color:var(--namornicka);font-weight:500}

  .koupit{display:inline-block;margin-top:20px;background:var(--namornicka);color:var(--slonovina);
    font-family:'Cinzel',serif;font-size:.82rem;letter-spacing:.14em;text-transform:uppercase;
    padding:15px 34px;border:none;cursor:pointer;border-radius:2px;transition:.18s}
  .koupit:hover{background:var(--namornicka2)}
  .jeden{font-style:italic;color:var(--tlumeny);font-size:.92rem;margin-top:12px}

  .podobne{padding:36px 0 70px;border-top:1px solid var(--linka)}
  .podobne h2{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:1.9rem;text-align:center;margin-bottom:6px}
  .podobne .eyebrow{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.32em;text-transform:uppercase;color:var(--zlata);text-align:center;display:block}
  .pmrizka{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:24px 20px;margin-top:24px}
  .pkarta .pfoto{aspect-ratio:4/5;overflow:hidden;background:var(--slonovina2);border:1px solid var(--linka);border-radius:16px}
  .pkarta .pfoto img{width:100%;height:100%;object-fit:cover;transition:transform .6s}
  .pkarta:hover .pfoto img{transform:scale(1.05)}
  .pkarta h3{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:1.16rem;margin:10px 0 2px}
  .pkarta .pcena{color:var(--namornicka2);font-size:.96rem}
  @media(max-width:560px){.pmrizka{grid-template-columns:1fr 1fr;gap:16px 12px}}

  .nacitam{text-align:center;padding:90px 0;color:var(--tlumeny);font-style:italic}
  footer{text-align:center;padding:28px 0 50px;color:var(--tlumeny);font-size:.86rem}
  footer a{color:var(--zlata)}
</style>
  <link rel="canonical" href="https://oaza-adamanthea.cz/produkt">
  <meta name="description" content="Krystaly, šperky a poklady z Bali v e-shopu Oázy Adamanthea.">
  <meta property="og:title" content="Produkt — Oáza Adamanthea">
  <meta property="og:description" content="Krystaly, šperky a poklady z Bali v e-shopu Oázy Adamanthea.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Oáza Adamanthea">
  <meta property="og:locale" content="cs_CZ">
  <meta property="og:url" content="https://oaza-adamanthea.cz/produkt">
  <meta property="og:image" content="https://oaza-adamanthea.cz/img/og-nahled.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
</head>
<body>
<div class="wrap">
  <a class="zpet" href="/bali-shop">✦ Zpět do obchodu</a>
  <div id="obsah"><div class="nacitam">Načítám…</div></div>
</div>
<footer><div class="wrap">Oáza Adamanthea · <a href="/kontakt">Kontakt</a></div></footer>

<script>
const KONTAKT='oaza.adamanthea@gmail.com';
const $=s=>document.querySelector(s);
const esc=s=>String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const slug=new URLSearchParams(location.search).get('slug');
let MENA=(localStorage.getItem('oaza_mena')==='eur')?'eur':'czk';
const cenaFmt=p=> MENA==='eur' ? (p.cena_eur||0).toLocaleString('cs-CZ')+' €' : (p.cena||0).toLocaleString('cs-CZ')+' Kč';

async function nacti(){
  if(!slug){$('#obsah').innerHTML='<div class="nacitam">Produkt nenalezen.</div>';return;}
  try{
    const r=await fetch('/api/produkty?slug='+encodeURIComponent(slug));
    const j=await r.json(); if(!r.ok)throw new Error(j.error||'chyba');
    render(j.produkt);
    nactiPodobne(j.produkt);
  }catch(e){$('#obsah').innerHTML='<div class="nacitam">Produkt se nepodařilo načíst.</div>';}
}

function render(p){
  document.title=p.nazev+' — Oáza Adamanthea';
  const fotky=p.fotky||[];
  const kat=(p.kategorie||'').replace(/-/g,' ');
  const vlast=[];
  if((p.barva||[]).length)   vlast.push(`<div><b>Barva:</b> ${esc(p.barva.join(', '))}</div>`);
  if((p.velikost||[]).length)vlast.push(`<div><b>Velikost:</b> ${esc(p.velikost.join(', '))}</div>`);
  if((p.ucel||[]).length)    vlast.push(`<div><b>Zaměření:</b> ${esc(p.ucel.join(', '))}</div>`);

  const cenaText = (p.cena||0).toLocaleString('cs-CZ')+' Kč / '+(p.cena_eur||0).toLocaleString('cs-CZ')+' €';
  const predmet=encodeURIComponent('Zájem o produkt: '+p.nazev);
  const telo=encodeURIComponent('Dobrý den,\n\nmám zájem o produkt „'+p.nazev+'" ('+cenaText+').\nProsím o informace.\n\nDěkuji.');
  const dostupny = (p.stav === 'skladem') && !p.rezervovano;
  const cta = 'Do košíku';
  const pozn = p.digitalni
    ? '✦ Digitální produkt — doručíme po zaplacení e-mailem.'
    : (!dostupny
        ? (p.rezervovano
            ? '✦ Momentálně rezervováno jiným zákazníkem — zkus to prosím za pár hodin.'
            : '✦ Tento kus je již prodán.')
        : '✦ Jediný kus — po prodeji už nebude k dispozici.');

  $('#obsah').innerHTML=`
  <div class="detail">
    <div class="galerie">
      <div class="hlavni"><img id="hlavniFoto" src="${esc(fotky[0]||'')}" alt="${esc(p.nazev)}"></div>
      ${fotky.length>1?`<div class="mini">${fotky.map((f,i)=>`<img src="${esc(f)}" class="${i===0?'akt':''}" onclick="prepni(${i},this)">`).join('')}</div>`:''}
      ${(p.videa||[]).map(v=>`<video src="${esc(v)}" controls playsinline></video>`).join('')}
    </div>
    <div class="info">
      <div class="eyebrow">${esc(kat)||'Bali Shop'}</div>
      <h1>${esc(p.nazev)}</h1>
      <div class="cena-radek" style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
        <span class="cena" id="cenaText">${cenaFmt(p)}</span>
        <span class="mena-prep" id="mena-prep"><button data-m="czk">Kč</button><button data-m="eur">€</button></span>
      </div>
      ${p.stitek?`<div class="stitky"><span class="tag">${esc(p.stitek)}</span></div>`:''}
      <div class="delic"></div>
      ${p.popis?`<div class="popis">${esc(p.popis)}</div>`:''}
      ${vlast.length?`<div class="vlastnosti">${vlast.join('')}</div>`:''}
      <button class="koupit" id="doKosiku"${dostupny ? '' : ' disabled'}>${dostupny ? cta : (p.rezervovano ? 'Rezervováno' : 'Prodáno')}</button>
      <div class="jeden">${pozn}</div>
    </div>
  </div>`;
  window.FOTKY=fotky; window.PROD=p;
  const btn=document.getElementById('doKosiku');
  if(dostupny){
    function syncBtn(){ if(window.Kosik && Kosik.obsahuje(p.slug)){btn.textContent='✓ V košíku — zobrazit';} else {btn.textContent=cta;} }
    syncBtn();
    btn.onclick=()=>{
      if(!window.Kosik) return;
      if(Kosik.obsahuje(p.slug)) Kosik.otevri();
      else Kosik.pridej({slug:p.slug,nazev:p.nazev,cena:p.cena,cena_eur:p.cena_eur,fotka:(p.fotky||[])[0]||'',digitalni:p.digitalni});
      syncBtn();
    };
  }
  document.querySelectorAll('#mena-prep button').forEach(b=>{
    b.classList.toggle('akt',b.dataset.m===MENA);
    b.onclick=()=>{MENA=b.dataset.m;localStorage.setItem('oaza_mena',MENA);
      document.querySelectorAll('#mena-prep button').forEach(x=>x.classList.toggle('akt',x.dataset.m===MENA));
      $('#cenaText').textContent=cenaFmt(window.PROD);};
  });
}
window.prepni=(i,el)=>{$('#hlavniFoto').src=window.FOTKY[i];
  document.querySelectorAll('.mini img').forEach(x=>x.classList.remove('akt'));el.classList.add('akt');};

async function nactiPodobne(p){
  try{
    const r=await fetch('/api/produkty'); const j=await r.json();
    const pod=(j.produkty||[]).filter(x=>x.kategorie===p.kategorie&&x.slug!==p.slug).slice(0,4);
    if(!pod.length)return;
    const kat=(p.kategorie||'').replace(/-/g,' ');
    $('#obsah').insertAdjacentHTML('beforeend',
    `<div class="podobne"><span class="eyebrow">Mohlo by se hodit</span><h2>Z kategorie ${esc(kat)}</h2>
      <div class="pmrizka">${pod.map(x=>`<a class="pkarta" href="/produkt?slug=${encodeURIComponent(x.slug)}">
        <div class="pfoto"><img src="${esc(x.fotky[0]||'')}" alt="${esc(x.nazev)}" loading="lazy"></div>
        <h3>${esc(x.nazev)}</h3><div class="pcena">${x.cena.toLocaleString('cs-CZ')} Kč</div></a>`).join('')}</div></div>`);
  }catch(e){}
}
nacti();
</script>
<script src="/kosik.js"></script>
</body>
</html>
